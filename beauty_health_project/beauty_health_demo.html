<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beauty & Health Demo v16</title>
<style>
:root{--bg:#f5f7fb;--card:#fff;--line:#d9e0ea;--text:#1f2937;--muted:#6b7280;--primary:#2563eb;--good:#16a34a;--warn:#d97706;--bad:#dc2626;--story:#7c3aed;--mongolia:#b45309;--shadow:0 8px 24px rgba(0,0,0,.08);--radius:16px}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;padding:24px 320px 24px 24px;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
.container{max-width:1360px;margin:auto}
h1{margin:0 0 8px}
h2{margin:0 0 12px;font-size:22px}
h3{margin:0 0 10px;font-size:18px}
.card{background:var(--card);padding:20px;border-radius:var(--radius);margin-top:16px;box-shadow:var(--shadow);border:1px solid var(--line)}
.lead,.mini-note{color:var(--muted);line-height:1.7}
.mini-note{font-size:12px}
.page-title-row{display:grid;grid-template-columns:1fr auto;gap:16px;align-items:start}
.lang-switch{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.nav,.subtabs{display:flex;gap:10px;flex-wrap:wrap}
.nav{margin-top:16px;position:sticky;top:0;background:rgba(245,247,251,.96);padding:10px 0;backdrop-filter:blur(8px);z-index:20}
button,.nav-btn,.subtab-btn,.lang-btn{padding:12px 16px;min-height:46px;border-radius:12px;border:1px solid #c7d2fe;background:#eef2ff;color:#1d4ed8;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;line-height:1.2;white-space:nowrap}
button.primary,.nav-btn.active,.subtab-btn.active,.lang-btn.active{background:var(--primary);border-color:var(--primary);color:#fff}
button{margin-top:14px}
.inline-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.ghost-btn{background:#fff;color:#1d4ed8}
.danger{background:#b91c1c!important;border-color:#b91c1c!important;color:#fff!important}
label{display:block;font-weight:700;margin-top:8px}
select,textarea,input[type=text],input[type=url],input[type=file],input[type=password]{width:100%;padding:12px;border-radius:10px;border:1px solid #cfd7e3;margin-top:8px;font-size:14px;background:#fff}
textarea{min-height:120px;resize:vertical;line-height:1.7}
.page{display:none}.page.active{display:block}
.result{background:#f8fbff;padding:16px;border-radius:12px;border:1px solid #dbeafe;margin-top:12px;line-height:1.8}
.pill-grid{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px}
.pill{border:1px solid #c7d2fe;background:#eef2ff;color:#1d4ed8;border-radius:999px;padding:10px 14px;cursor:pointer;font-weight:700;font-size:14px;user-select:none}
.pill.active{background:var(--primary);border-color:var(--primary);color:#fff}
.tag{display:inline-block;background:#eef2ff;color:#1d4ed8;padding:6px 10px;border-radius:999px;margin:4px 6px 0 0;font-size:12px;font-weight:700;border:1px solid #c7d2fe}
.tag.good{background:#ecfdf5;color:#166534;border-color:#a7f3d0}
.tag.story{background:#f5f3ff;color:#6d28d9;border-color:#c4b5fd}
.tag.mongolia{background:#fffbeb;color:#b45309;border-color:#f59e0b}
.question-row{display:grid;grid-template-columns:180px 1fr 42px;gap:12px;align-items:center;margin-top:12px}
.question-row input[type=range]{width:100%}
.range-value{text-align:center;font-weight:800;color:var(--primary)}
.preview-wrap,.compare-columns,.image-grid,.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.preview-box,.compare-panel{border:1px solid var(--line);border-radius:12px;padding:12px;background:#fff}
.preview-image,.preview-canvas,.detail-image{width:100%;border-radius:10px;border:1px solid var(--line);background:#fff;display:none}
.detail-image{display:block}
.product{position:relative;border:1px solid var(--line);border-radius:12px;padding:14px;margin-top:12px;background:#fff;overflow:hidden;cursor:pointer}
.product-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.product-stamp{display:inline-flex;align-items:center;justify-content:center;min-width:120px;min-height:72px;padding:10px 12px;border:3px solid currentColor;border-radius:14px;font-size:18px;font-weight:900;letter-spacing:.04em;transform:rotate(8deg);text-align:center;background:rgba(255,255,255,.92)}
.stamp-mongolia{color:#b45309;background:#fffbeb;border-color:#f59e0b}
.stamp-story{color:#6d28d9;background:#f5f3ff;border-color:#a78bfa}
.stamp-custom{color:#be123c;background:#fff1f2;border-color:#fb7185}
.scorebar{margin-top:12px}
.scorebar-head{display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-bottom:4px}
.scorebar-outer{height:14px;border-radius:999px;background:#e5e7eb;overflow:hidden}
.scorebar-inner{height:100%;background:var(--primary)}
#cropStage{position:relative;display:inline-block;width:100%;cursor:crosshair}
#ingredientPreview{pointer-events:none}
#cropBox{display:none;position:absolute;border:2px solid #2563eb;background:rgba(37,99,235,.12);pointer-events:none}
.status-line{font-size:13px;color:var(--muted);white-space:pre-wrap;margin-top:8px}
.story-strip{margin-top:14px;padding:12px 14px;border:1px solid #fde68a;background:#fffbeb;border-radius:12px;color:#92400e;font-weight:700}
.side-ad{position:fixed;right:16px;top:88px;width:280px;background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:18px;z-index:10}
.side-ad h3{margin:0 0 10px;font-size:20px;line-height:1.5}
.side-ad p{margin:0;color:var(--muted);line-height:1.8}
.side-ad .ad-badge{display:inline-block;padding:6px 10px;border-radius:999px;background:#eef2ff;color:#1d4ed8;border:1px solid #c7d2fe;font-size:12px;font-weight:700;margin-bottom:10px}
.top-fab{position:fixed;right:12px;bottom:12px;z-index:30;border:0;border-radius:999px;background:var(--primary);color:#fff;min-width:52px}
.modal{position:fixed;inset:0;background:rgba(15,23,42,.55);display:none;align-items:center;justify-content:center;padding:24px;z-index:9999}
.modal.active{display:flex}
.modal-content{background:#fff;width:min(980px,100%);max-height:90vh;overflow:auto;border-radius:18px;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:12px}
.hidden{display:none!important}
@media (max-width:1300px){body{padding-right:24px}.side-ad{position:relative;right:auto;top:auto;width:auto;margin:16px 0 0 0}}
@media (max-width:1020px){.grid-2,.grid-3,.preview-wrap,.compare-columns,.image-grid,.page-title-row,.admin-grid{grid-template-columns:1fr}.question-row{grid-template-columns:1fr}.modal{padding:12px}}
</style>
</head>
<body>
<button class="top-fab" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
<aside class="side-ad">
  <div class="ad-badge" data-i18n="adBadge">広告</div>
  <h3 data-i18n="adHeadline"></h3>
  <p data-i18n="adBody"></p>
  <button class="primary" onclick="showPage('mongolia')" data-i18n="adButton"></button>
</aside>

<div class="container">
  <div class="page-title-row">
    <div>
      <h1 id="pageTitle" data-i18n="pageTitle"></h1>
      <p class="lead" data-i18n="pageLead"></p>
    </div>
    <div class="lang-switch">
      <button class="lang-btn active" id="langJa" onclick="switchLang('ja')">日本語</button>
      <button class="lang-btn" id="langEn" onclick="switchLang('en')">English</button>
      <button class="lang-btn" id="langZh" onclick="switchLang('zh')">中文</button>
    </div>
  </div>

  <div class="nav">
    <button class="nav-btn active" data-page="builder" onclick="showPage('builder')" data-i18n="navBuilder"></button>
    <button class="nav-btn" data-page="catalog" onclick="showPage('catalog')" data-i18n="navCatalog"></button>
    <button class="nav-btn" data-page="ingredients" onclick="showPage('ingredients')" data-i18n="navIngredients"></button>
    <button class="nav-btn" data-page="ranking" onclick="showPage('ranking')" data-i18n="navRanking"></button>
    <button class="nav-btn" data-page="mongolia" onclick="showPage('mongolia')" data-i18n="navMongolia"></button>
  </div>

  <section id="builder" class="page active">
    <div class="card">
      <h2 data-i18n="section1"></h2>
      <div class="grid-3">
        <div><label data-i18n="domain"></label><select id="domainSelect"></select></div>
        <div><label data-i18n="subcategory"></label><select id="subcategorySelect"></select></div>
        <div><label data-i18n="usage"></label><select id="usageTimeSelect"></select></div>
      </div>
    </div>

    <div class="card">
      <h2 data-i18n="section2"></h2>
      <div class="grid-2">
        <div>
          <div id="questionArea"></div>
          <div class="inline-actions">
            <button class="primary" onclick="diagnoseFromQuestions()" data-i18n="diagnose"></button>
            <button onclick="shareDiagnosis()" data-i18n="shareDiagnosis"></button>
          </div>
        </div>
        <div>
          <div id="diagnosisResult" class="result"></div>
          <div class="preview-box" style="margin-top:12px"><canvas id="radarCanvas" width="360" height="360" style="width:100%;max-width:360px;display:block;margin:auto"></canvas></div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2 data-i18n="section3"></h2>
      <div class="grid-2">
        <div><label data-i18n="texture"></label><select id="textureSelect"></select></div>
        <div><label data-i18n="philosophy"></label><select id="philosophySelect"></select></div>
      </div>
      <div style="margin-top:12px"><b data-i18n="avoid"></b></div>
      <div id="avoidPills" class="pill-grid"></div>
      <div class="inline-actions">
        <button class="primary" onclick="buildIdealFormula()" data-i18n="build"></button>
        <button onclick="resetBuilder()" data-i18n="reset"></button>
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <h2 data-i18n="section4"></h2>
        <div id="recommendedIngredients"></div>
      </div>
      <div class="card">
        <h2 data-i18n="section5"></h2>
        <div id="formulaSummary"></div>
        <div id="barGraphArea"></div>
        <div class="inline-actions">
          <button class="primary" onclick="saveFormulaToRanking()" data-i18n="saveRanking"></button>
          <button onclick="shareCurrentFormula()" data-i18n="share"></button>
        </div>
      </div>
    </div>

    <div class="card">
      <h2 data-i18n="section6"></h2>
      <div id="idealCompareBox"></div>
    </div>

    <div class="card">
      <h2 data-i18n="section7"></h2>
      <div class="grid-2">
        <div>
          <label data-i18n="productName"></label><input id="uploadProductName" type="text">
          <label data-i18n="brand"></label><input id="uploadBrandName" type="text">
          <label data-i18n="overallImage"></label><input id="overallImageInput" type="file" accept="image/*">
          <label data-i18n="ingredientImage"></label><input id="ingredientImageInput" type="file" accept="image/*">
          <div class="inline-actions">
            <button onclick="resetCropSelection()" data-i18n="selectRangeReset"></button>
            <button onclick="selectWholeImage()" data-i18n="selectWholeImage"></button>
          </div>
          <label data-i18n="ocrManual"></label><textarea id="ocrManualInput"></textarea>
          <div id="ocrStatus" class="status-line"></div>
          <div class="inline-actions">
            <button class="primary" onclick="analyzeUploadedIngredients()" data-i18n="analyze"></button>
            <button onclick="saveUploadedProduct()" data-i18n="saveUploaded"></button>
          </div>
        </div>
        <div>
          <div class="preview-wrap">
            <div class="preview-box"><h4 data-i18n="previewOverall"></h4><img id="overallPreview" class="preview-image" alt=""></div>
            <div class="preview-box"><h4 data-i18n="previewIngredient"></h4><div id="cropStage"><img id="ingredientPreview" class="preview-image" alt=""><div id="cropBox"></div></div></div>
          </div>
          <div class="preview-wrap" style="margin-top:12px">
            <div class="preview-box"><h4 data-i18n="ocrProcessed"></h4><canvas id="processedCanvas" class="preview-canvas" width="320" height="320"></canvas></div>
            <div class="preview-box"><h4 data-i18n="ocrResult"></h4><div id="ocrResultBox" class="result"></div></div>
          </div>
        </div>
      </div>
      <div id="uploadedCompareBox"></div>
    </div>
  </section>

  <section id="catalog" class="page">
    <div class="card">
      <h2 data-i18n="catalogTitle"></h2>
      <div class="grid-3">
        <div><label data-i18n="domain"></label><select id="catalogDomainFilter"></select></div>
        <div><label data-i18n="subcategory"></label><select id="catalogSubcategoryFilter"></select></div>
        <div><label data-i18n="sort"></label><select id="catalogSort"></select></div>
      </div>
      <div class="grid-2">
        <div><label data-i18n="period"></label><select id="catalogPeriod"></select></div>
        <div><label data-i18n="badgeFilter"></label><select id="catalogBadgeFilter"></select></div>
      </div>
      <div id="catalogList"></div>
    </div>
  </section>

  <section id="ingredients" class="page">
    <div class="card">
      <h2 data-i18n="ingredientsTitle"></h2>
      <div class="grid-3">
        <div><label data-i18n="domain"></label><select id="ingredientDomainFilter"></select></div>
        <div><label data-i18n="sort"></label><select id="ingredientSort"></select></div>
        <div><label data-i18n="period"></label><select id="ingredientPeriod"></select></div>
      </div>
      <div id="ingredientList"></div>
    </div>
  </section>

  <section id="ranking" class="page">
    <div class="card">
      <h2 data-i18n="rankingTitle"></h2>
      <div class="subtabs">
        <button class="subtab-btn active" data-ranktab="formula" onclick="switchRankingTab('formula')" data-i18n="tabFormula"></button>
        <button class="subtab-btn" data-ranktab="product" onclick="switchRankingTab('product')" data-i18n="tabProduct"></button>
        <button class="subtab-btn" data-ranktab="ingredient" onclick="switchRankingTab('ingredient')" data-i18n="tabIngredient"></button>
      </div>
      <div class="grid-3">
        <div><label data-i18n="domain"></label><select id="rankingDomainFilter"></select></div>
        <div><label data-i18n="sort"></label><select id="rankingSort"></select></div>
        <div><label data-i18n="period"></label><select id="rankingPeriod"></select></div>
      </div>
      <div id="rankingList"></div>
    </div>
  </section>

  <section id="mongolia" class="page">
    <div class="card">
      <h2 data-i18n="mongoliaTitle"></h2>
      <div class="result" data-i18n="mongoliaIntro"></div>
      <div id="mongoliaFeatureList"></div>
    </div>
  </section>

  <section id="admin" class="page">
    <div class="card">
      <h2 data-i18n="adminTitle"></h2>
      <div id="adminLoginBox">
        <label data-i18n="adminPassword"></label>
        <input id="adminPassword" type="password">
        <div class="inline-actions">
          <button class="primary" onclick="unlockAdmin()" data-i18n="login"></button>
          <button onclick="resetAllData()" data-i18n="resetData"></button>
        </div>
        <div class="mini-note">admin123</div>
      </div>
      <div id="adminBody" class="hidden">
        <div class="admin-grid">
          <div class="card" style="margin-top:0"><h3 data-i18n="productsExcel"></h3><input id="productExcelInput" type="file" accept=".xlsx,.xls"><button onclick="importProductsExcel()" data-i18n="import"></button></div>
          <div class="card" style="margin-top:0"><h3 data-i18n="ingredientsExcel"></h3><input id="ingredientExcelInput" type="file" accept=".xlsx,.xls"><button onclick="importIngredientsExcel()" data-i18n="import"></button></div>
          <div class="card" style="margin-top:0"><h3 data-i18n="ocrExcel"></h3><input id="ocrExcelInput" type="file" accept=".xlsx,.xls"><button onclick="importOcrCorrectionsExcel()" data-i18n="import"></button></div>
        </div>
        <div class="inline-actions">
          <button onclick="exportProductsTemplate()" data-i18n="exportProducts"></button>
          <button onclick="exportIngredientsTemplate()" data-i18n="exportIngredients"></button>
          <button onclick="exportOcrTemplate()" data-i18n="exportOcr"></button>
        </div>
        <div id="excelImportStatus" class="result"></div>
        <h3 data-i18n="pending"></h3>
        <div id="pendingProducts"></div>
      </div>
    </div>
  </section>
</div>

<div id="modal" class="modal">
  <div class="modal-content">
    <div class="modal-top">
      <h2 id="modalTitle"></h2>
      <div class="inline-actions" style="margin-top:0">
        <button onclick="shareCurrentModal()" data-i18n="share"></button>
        <button class="primary" onclick="closeModal()" data-i18n="close"></button>
      </div>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

function populateCategorySelect(domainId, categoryId, noAll){
  const domain = document.getElementById(domainId).value || 'cosmetics';
  const sel = document.getElementById(categoryId); const prev = sel.value;
  let html = noAll ? '' : `<option value="all">${t('all')}</option>`;
  if(domain==='all'){ sel.innerHTML = html; return; }
  html += DOMAIN_OPTIONS[domain].map(k=>`<option value="${k}">${subcategoryLabel(k)}</option>`).join('');
  sel.innerHTML = html;
  if(noAll) sel.value = prev && DOMAIN_OPTIONS[domain].includes(prev) ? prev : DOMAIN_OPTIONS[domain][0];
  else sel.value = prev && (prev==='all' || DOMAIN_OPTIONS[domain].includes(prev)) ? prev : 'all';
}

function defaultAnswers(){ const defs = QUESTION_DEFS[document.getElementById('domainSelect').value||'cosmetics']; const out={}; defs.forEach(([k])=>out[k]=3); return out; }
function renderQuestionArea(){ state.answers = defaultAnswers(); const defs = QUESTION_DEFS[document.getElementById('domainSelect').value||'cosmetics']; document.getElementById('questionArea').innerHTML = defs.map(([key,label])=>`<div class="question-row"><div><b>${escapeHtml(optionLabel(label))}</b></div><input type="range" min="1" max="5" step="1" value="${state.answers[key]}" oninput="updateAnswer('${key}',this.value)"><div class="range-value" id="range_${key}">${state.answers[key]}</div></div>`).join(''); drawRadar(); }
function updateAnswer(key,val){ state.answers[key]=Number(val); document.getElementById('range_'+key).textContent=val; drawRadar(); }
function drawRadar(){ const canvas = document.getElementById('radarCanvas'); const ctx = canvas.getContext('2d'); ctx.clearRect(0,0,canvas.width,canvas.height); const defs = QUESTION_DEFS[document.getElementById('domainSelect').value||'cosmetics']; const cx=canvas.width/2, cy=canvas.height/2, radius=110, n=defs.length; ctx.strokeStyle='#d1d5db'; for(let step=1; step<=5; step++){ ctx.beginPath(); for(let i=0;i<n;i++){ const a=-Math.PI/2 + Math.PI*2*i/n; const r=radius*step/5; const x=cx+Math.cos(a)*r, y=cy+Math.sin(a)*r; if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);} ctx.closePath(); ctx.stroke(); }
  for(let i=0;i<n;i++){ const a=-Math.PI/2 + Math.PI*2*i/n; const x=cx+Math.cos(a)*radius, y=cy+Math.sin(a)*radius; ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(x,y); ctx.stroke(); const label=optionLabel(defs[i][1]); ctx.fillStyle='#374151'; ctx.font='12px Arial'; ctx.textAlign=(x<cx-10?'right':x>cx+10?'left':'center'); ctx.fillText(label, cx+Math.cos(a)*(radius+24), cy+Math.sin(a)*(radius+24)); }
  ctx.beginPath(); for(let i=0;i<n;i++){ const a=-Math.PI/2 + Math.PI*2*i/n; const r=radius*(state.answers[defs[i][0]]||3)/5; const x=cx+Math.cos(a)*r, y=cy+Math.sin(a)*r; if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); } ctx.closePath(); ctx.fillStyle='rgba(37,99,235,.18)'; ctx.fill(); ctx.strokeStyle='#2563eb'; ctx.lineWidth=2; ctx.stroke();
}

function diagnoseFromQuestions(){
  const domain = document.getElementById('domainSelect').value||'cosmetics';
  let diagnosis='', concerns=[];
  if(domain==='cosmetics'){
    const a = state.answers;
    diagnosis = a.sensitivity>=4 ? (state.lang==='en'?'Sensitive skin':state.lang==='zh'?'敏感肌':'敏感肌') :
      a.dryness>=4 && a.oiliness<=2 ? (state.lang==='en'?'Dry skin':state.lang==='zh'?'干燥肌':'乾燥肌') :
      a.oiliness>=4 && a.dryness<=2 ? (state.lang==='en'?'Oily skin':state.lang==='zh'?'油性肌':'脂性肌') :
      (state.lang==='en'?'Combination skin':state.lang==='zh'?'混合肌':'混合肌');
    if(a.dryness>=4) concerns.push('乾燥');
    if(a.sensitivity>=4) concerns.push('敏感');
    if(a.dullness>=4) concerns.push('透明感');
    if(a.firmness>=4) concerns.push('ハリ');
    if(!concerns.length) concerns.push('バランス');
  } else {
    const a = state.answers;
    diagnosis = a.rest>=4 ? (state.lang==='en'?'Rest focused':state.lang==='zh'?'休息重点':'休息重視') :
      a.energy>=4 ? (state.lang==='en'?'Energy focused':state.lang==='zh'?'活力重点':'活力重視') :
      a.beauty>=4 ? (state.lang==='en'?'Beauty focused':state.lang==='zh'?'美容重点':'美容重視') :
      a.gut>=4 ? (state.lang==='en'?'Gut focused':state.lang==='zh'?'肠道重点':'腸活重視') :
      (state.lang==='en'?'Balanced':state.lang==='zh'?'平衡重点':'バランス重視');
    if(a.rest>=4) concerns.push('休息');
    if(a.energy>=4) concerns.push('活力');
    if(a.beauty>=4) concerns.push('美容');
    if(a.gut>=4) concerns.push('腸活');
    if(!concerns.length) concerns.push('栄養');
  }
  state.currentDiagnosis = {diagnosis, concerns, domain};
  document.getElementById('diagnosisResult').innerHTML = `<div><b>${t('diagnosisResult')}:</b> ${escapeHtml(diagnosis)}</div><div style="margin-top:8px"><b>${t('concerns')}:</b> ${concerns.map(v=>`<span class="tag">${escapeHtml(v)}</span>`).join('')}</div>`;
}

function ingredientMatchesConcern(name, domain, concerns){
  const ing = state.ingredients[name]; if(!ing || ing.domain!==domain) return false;
  const joined = [name, ...(ing.tags||[])].join(' ');
  if(domain==='cosmetics'){
    if(concerns.includes('乾燥') && /セラミド|ヒアルロン酸|保湿/.test(joined)) return true;
    if(concerns.includes('敏感') && /整肌|バリア|セラミド/.test(joined)) return true;
    if(concerns.includes('透明感') && /透明感|ナイアシン/.test(joined)) return true;
    if(concerns.includes('ハリ') && /ハリ|プラセンタ|ナイアシン/.test(joined)) return true;
    return concerns.includes('バランス');
  } else {
    if(concerns.includes('休息') && /GABA|休息/.test(joined)) return true;
    if(concerns.includes('活力') && /活力/.test(joined)) return true;
    if(concerns.includes('美容') && /美容|コラーゲン/.test(joined)) return true;
    if(concerns.includes('腸活') && /腸活|乳酸菌/.test(joined)) return true;
    return concerns.includes('栄養');
  }
}

function buildIdealFormula(){
  if(!state.currentDiagnosis) diagnoseFromQuestions();
  const domain = document.getElementById('domainSelect').value||'cosmetics';
  const names = Object.keys(state.ingredients).filter(n=>state.ingredients[n].domain===domain);
  state.recommendedIngredients = names.filter(n=>ingredientMatchesConcern(n, domain, state.currentDiagnosis.concerns)).slice(0,8);
  if(!state.recommendedIngredients.length) state.recommendedIngredients = names.slice(0,5);
  state.selectedIngredients = [...state.recommendedIngredients];
  renderRecommendedIngredients();
  refreshFormulaOutputs();
}

function toggleIngredient(name,checked){ if(checked){ if(!state.selectedIngredients.includes(name)) state.selectedIngredients.push(name);} else {state.selectedIngredients = state.selectedIngredients.filter(v=>v!==name);} refreshFormulaOutputs(); }

function analyzeIngredientNames(names){ return names.map(n=>({name:n, ...(state.ingredients[n]||{})})); }
function calcMetrics(items, domain){
  const defs = domain==='health'
    ? [{key:'energy',label:{ja:'活力',en:'Energy',zh:'活力'}},{key:'rest',label:{ja:'休息',en:'Rest',zh:'休息'}},{key:'beauty',label:{ja:'美容',en:'Beauty',zh:'美容'}},{key:'gut',label:{ja:'腸活',en:'Gut',zh:'肠道'}},{key:'balance',label:{ja:'バランス',en:'Balance',zh:'平衡'}}]
    : [{key:'moisture',label:{ja:'保湿',en:'Moisture',zh:'保湿'}},{key:'barrier',label:{ja:'バリア',en:'Barrier',zh:'屏障'}},{key:'brightening',label:{ja:'透明感',en:'Brightness',zh:'透亮'}},{key:'firmness',label:{ja:'ハリ',en:'Firmness',zh:'弹力'}},{key:'soothing',label:{ja:'整肌',en:'Soothing',zh:'舒缓'}}];
  return defs.map(def=>{ let score=0, count=0; items.forEach(item=>{ const v = (item.dimensions||{})[def.key]||0; score += v; if(v>0) count += 1; }); return {key:def.key,label:optionLabel(def.label),score:Math.max(0,Math.min(100,score)),count}; });
}
function renderMetricBars(metrics){ return metrics.map(m=>`<div class="scorebar"><div class="scorebar-head"><span>${escapeHtml(m.label)} ${m.count}</span><span>${m.score}</span></div><div class="scorebar-outer"><div class="scorebar-inner" style="width:${m.score}%"></div></div></div>`).join(''); }
function refreshFormulaOutputs(){
  if(!state.selectedIngredients.length){ document.getElementById('formulaSummary').innerHTML=''; document.getElementById('barGraphArea').innerHTML=''; renderIdealComparisons(); return; }
  const domain = document.getElementById('domainSelect').value||'cosmetics';
  const subcategory = document.getElementById('subcategorySelect').value||'';
  const items = analyzeIngredientNames(state.selectedIngredients);
  const metrics = calcMetrics(items, domain);
  state.currentFormula = {id:'f_'+Date.now(),name: state.lang==='en'?'Ideal Design':state.lang==='zh'?'理想设计':'理想設計', domain, subcategory, ingredients:[...state.selectedIngredients], metrics, createdAt:Date.now(), likes:0, views:0};
  document.getElementById('formulaSummary').innerHTML = `<div class="result"><div><span class="tag">${domainLabel(domain)}</span><span class="tag">${escapeHtml(subcategoryLabel(subcategory))}</span></div><div style="margin-top:10px"><b>${escapeHtml(state.currentFormula.name)}</b></div><div style="margin-top:8px">${state.currentFormula.ingredients.map(v=>`<span class="tag good">${escapeHtml(ingredientDisplayName(v))}</span>`).join('')}</div></div>`;
  document.getElementById('barGraphArea').innerHTML = renderMetricBars(metrics);
  renderIdealComparisons();
}
function compareAgainstIdeal(prod){
  if(!state.currentFormula) return null;
  const ideal = new Set(state.currentFormula.ingredients);
  const actual = new Set(prod.ingredients||[]);
  const overlap = [...ideal].filter(v=>actual.has(v));
  const missing = [...ideal].filter(v=>!actual.has(v));
  const extra = [...actual].filter(v=>!ideal.has(v));
  return {overlap, missing, extra, score:Math.max(0,Math.min(100, overlap.length*18 - missing.length*5 - extra.length*3 + 40))};
}
function getApprovedProducts(){ return [...state.products, ...state.importedProducts.filter(v=>v.status==='approved')]; }
function renderIdealComparisons(){
  const box = document.getElementById('idealCompareBox');
  if(!state.currentFormula){ box.innerHTML = `<div class="result">${t('noCompare')}</div>`; return; }
  const exact = getApprovedProducts().filter(p=>p.domain===state.currentFormula.domain && p.subcategory===state.currentFormula.subcategory);
  const usedFallback = !exact.length;
  const source = exact.length ? exact : getApprovedProducts().filter(p=>p.domain===state.currentFormula.domain);
  const cards = source.slice(0,3).map(p=>{
    const cmp = compareAgainstIdeal(p);
    return `<div class="product" onclick="openCompareWithProduct('${p.id}')"><div class="product-head"><div><div><span class="tag">${domainLabel(p.domain)}</span><span class="tag">${escapeHtml(subcategoryLabel(p.subcategory||''))}</span></div><h3 style="margin-top:8px">${escapeHtml(p.name)}</h3><div class="mini-note">${escapeHtml(p.brand||'')}</div><div style="margin-top:8px">${cmp.overlap.map(v=>`<span class="tag good">${escapeHtml(ingredientDisplayName(v))}</span>`).join('')}</div><div class="mini-note">${t('comparePromo')}</div></div>${storyStamp(p)}</div></div>`;
  }).join('');
  box.innerHTML = (usedFallback && source.length ? `<div class="result">${t('compareFallback')}</div>` : '') + (source.length ? cards : `<div class="result">${t('noCatalog')}</div>`);
}

function inPeriod(ts, period){ if(period==='all') return true; const now = Date.now(); const ms = period==='day'?86400000:period==='week'?86400000*7:period==='month'?86400000*31:86400000*365; return (now - (ts||0)) <= ms; }
function storyStamp(p){ if(!p.storyBadge) return ''; const cls = p.storyBadge===t('badgeMongolia') || p.storyBadge==='モンゴルブランド' || p.storyBadge==='Mongolia Brand' || p.storyBadge==='蒙古品牌' ? 'stamp-mongolia' : (p.storyBadge===t('badgeStory') || p.storyBadge==='原料ストーリーあり' ? 'stamp-story' : 'stamp-custom'); return `<div class="product-stamp ${cls}">${escapeHtml(p.storyBadge)}</div>`; }

function renderCatalogPage(){
  let items = getApprovedProducts();
  const domain = document.getElementById('catalogDomainFilter').value, sub = document.getElementById('catalogSubcategoryFilter').value, sort=document.getElementById('catalogSort').value, period=document.getElementById('catalogPeriod').value, badge=document.getElementById('catalogBadgeFilter').value;
  if(domain!=='all') items = items.filter(v=>v.domain===domain);
  if(sub!=='all') items = items.filter(v=>v.subcategory===sub);
  items = items.filter(v=>inPeriod(v.createdAt, period));
  if(badge==='with') items = items.filter(v=>!!v.storyBadge);
  if(badge==='none') items = items.filter(v=>!v.storyBadge);
  if(badge==='mongolia') items = items.filter(v=>(v.storyBadge||'').includes('モンゴル') || (v.storyBadge||'').toLowerCase().includes('mongolia') || (v.storyBadge||'').includes('蒙古'));
  if(badge==='story') items = items.filter(v=>(v.storyBadge||'').includes('ストーリー') || (v.storyBadge||'').toLowerCase().includes('story'));
  if(badge==='custom') items = items.filter(v=>!!v.storyBadge && !((v.storyBadge||'').includes('モンゴル') || (v.storyBadge||'').includes('ストーリー') || (v.storyBadge||'').toLowerCase().includes('mongolia') || (v.storyBadge||'').toLowerCase().includes('story')));
  items.sort((a,b)=> sort==='new' ? (b.createdAt-a.createdAt) : ((b.views||0)-(a.views||0) || (b.createdAt-a.createdAt)));
  document.getElementById('catalogList').innerHTML = items.length ? items.map(v=>productCardHtml(v,'catalog')).join('') : `<div class="result">${t('noCatalog')}</div>`;
}

function loadPreview(file, target){

function bindImageInputs(){
  document.getElementById('overallImageInput').addEventListener('change', e=>loadPreview(e.target.files[0], document.getElementById('overallPreview')));
  document.getElementById('ingredientImageInput').addEventListener('change', e=>loadPreview(e.target.files[0], document.getElementById('ingredientPreview')));
  const stage = document.getElementById('cropStage'); const preview = document.getElementById('ingredientPreview');
  stage.addEventListener('mousedown', startCrop); window.addEventListener('mousemove', moveCrop); window.addEventListener('mouseup', endCrop);
}
function selectWholeImage(){ const preview = document.getElementById('ingredientPreview'); if(!preview.src) return; const stage = document.getElementById('cropStage').getBoundingClientRect(); const img = preview.getBoundingClientRect(); state.crop = {x: img.left-stage.left, y: img.top-stage.top, width: img.width, height: img.height}; drawCropBox(); }
function resetCropSelection(){ state.crop = null; drawCropBox(); }
function startCrop(e){ const preview = document.getElementById('ingredientPreview'); if(!preview.src) return; const img = preview.getBoundingClientRect(); if(e.clientX<img.left||e.clientX>img.right||e.clientY<img.top||e.clientY>img.bottom) return; const stage = document.getElementById('cropStage').getBoundingClientRect(); state.dragging = true; state.dragStart = {x:e.clientX-stage.left, y:e.clientY-stage.top}; state.crop = {x:state.dragStart.x,y:state.dragStart.y,width:1,height:1}; drawCropBox(); }
function moveCrop(e){ if(!state.dragging || !state.dragStart) return; const stage = document.getElementById('cropStage').getBoundingClientRect(); const x = e.clientX-stage.left, y = e.clientY-stage.top; state.crop = {x:Math.min(state.dragStart.x,x), y:Math.min(state.dragStart.y,y), width:Math.abs(x-state.dragStart.x), height:Math.abs(y-state.dragStart.y)}; drawCropBox(); }
function endCrop(){ state.dragging=false; state.dragStart=null; }
function drawCropBox(){ const box = document.getElementById('cropBox'); if(!state.crop){ box.style.display='none'; return; } box.style.display='block'; box.style.left = state.crop.x+'px'; box.style.top = state.crop.y+'px'; box.style.width = state.crop.width+'px'; box.style.height = state.crop.height+'px'; }
async function ensureScript(src, globalName){
  if(window[globalName]) return true;
  return new Promise((resolve)=>{ const s=document.createElement('script'); s.src=src; s.onload=()=>resolve(!!window[globalName]); s.onerror=()=>resolve(false); document.head.appendChild(s); });
}
function normalizeOCRIngredients(text){
  let s = String(text||'');
  state.ocrRules.forEach(r=>{ if(!r.wrong) return; s = s.split(r.wrong).join(r.correct||''); });
  return [...new Set(s.replace(/[\n\r\t]/g,'、').replace(/[・]/g,'、').split(/[、,]+/).map(v=>v.trim()).filter(Boolean).filter(v=>!/^[※＊*?？!！。、,.\-_=+\/\\()\[\]{}<>~^|]+$/.test(v)))];
}
async function analyzeUploadedIngredients(){
  const ingredientImg = document.getElementById('ingredientPreview');
  if(!ingredientImg.src && !document.getElementById('ocrManualInput').value.trim()){ document.getElementById('ocrStatus').textContent = t('ocrNoImage'); return; }
  let text = document.getElementById('ocrManualInput').value.trim();
  if(!text && ingredientImg.src){
    const ok = await ensureScript('https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js','Tesseract');
    if(ok){
      document.getElementById('ocrStatus').textContent = 'OCR...';
      try{
        const result = await window.Tesseract.recognize(ingredientImg.src, 'jpn+eng');
        text = result?.data?.text || '';

    }
  }
  if(!text){ document.getElementById('ocrStatus').textContent = t('ocrNeedManual'); document.getElementById('ocrResultBox').textContent=''; document.getElementById('uploadedCompareBox').innerHTML=''; return; }
  const ingredients = normalizeOCRIngredients(text);
  state.currentUploadedProduct = {
    id:'up_'+Date.now(),

    domain: document.getElementById('domainSelect').value,
    subcategory: document.getElementById('subcategorySelect').value,

  };
  document.getElementById('ocrStatus').textContent = t('ocrDone');

function exportRowsAsWorkbook(rows, sheetName, filename){
  ensureXLSX().then(ok=>{ if(!ok){ alert('XLSX library failed to load'); return; } const ws = window.XLSX.utils.json_to_sheet(rows); const wb = window.XLSX.utils.book_new(); window.XLSX.utils.book_append_sheet(wb, ws, sheetName); window.XLSX.writeFile(wb, filename); });
}
function exportProductsTemplate(){ exportRowsAsWorkbook([{id:'p1',domain:'cosmetics',subcategory:'serum',name:'製品名',brand:'ブランド名',ingredients:'成分A、成分B',adText:'紹介文',adUrl:'#',overallImage:'',ingredientImage:'',storyBadge:'',storyText:'',mongoliaIngredients:'ウマプラセンタエキス',createdAt:Date.now(),views:0}], 'products', 'products_template.xlsx');}
function exportIngredientsTemplate(){ exportRowsAsWorkbook([{name:'成分名',domain:'cosmetics',tags:'保湿、整肌',role:'主役',short:'概要',detail:'詳細',merits:'メリット1、メリット2',cautions:'注意1、注意2',moisture:10,barrier:10,brightening:0,firmness:0,soothing:0,energy:0,rest:0,beauty:0,gut:0,balance:0,mongolia:'FALSE',createdAt:Date.now(),views:0}], 'ingredients', 'ingredients_template.xlsx');}
function exportOcrTemplate(){ exportRowsAsWorkbook([{wrong:'ヒアル口ン酸Na',correct:'ヒアルロン酸Na'}], 'ocr', 'ocr_corrections_template.xlsx');}

function renderEmptyBuilder(){ document.getElementById('recommendedIngredients').innerHTML='<div class="result">-</div>'; document.getElementById('formulaSummary').innerHTML=''; document.getElementById('barGraphArea').innerHTML=''; document.getElementById('idealCompareBox').innerHTML=`<div class="result">${t('noCompare')}</div>`; document.getElementById('ocrResultBox').textContent=''; document.getElementById('ocrStatus').textContent=t('ocrNeedManual'); document.getElementById('uploadedCompareBox').innerHTML=''; document.getElementById('diagnosisResult').textContent=''; }
function resetBuilder(){ state.currentDiagnosis=null; state.recommendedIngredients=[]; state.selectedIngredients=[]; state.currentFormula=null; state.currentUploadedProduct=null; state.selectedAvoids=[]; renderAvoidPills(); renderQuestionArea(); renderEmptyBuilder(); }

function renderAll(){
  applyStaticTranslations();
  populateSelects();
  renderQuestionArea();
  renderAvoidPills();
  renderCatalogPage();
  renderIngredientPage();
  renderRankingPage();
  renderMongoliaPage();
  renderAdminPage();
  if(state.currentFormula) refreshFormulaOutputs(); else renderEmptyBuilder();
}

function init(){
  ensureSeedData();
  applyStaticTranslations();
  populateSelects();
  state.selectedAvoids = [];
  renderQuestionArea();
  renderAvoidPills();
  renderEmptyBuilder();
  bindImageInputs();
  renderCatalogPage();
  renderIngredientPage();
  renderRankingPage();
  renderMongoliaPage();
  document.getElementById('domainSelect').addEventListener('change', ()=>{ populateCategorySelect('domainSelect','subcategorySelect', true); renderQuestionArea(); renderAvoidPills(); resetBuilder(); });
  document.getElementById('catalogDomainFilter').addEventListener('change', ()=>{ populateCategorySelect('catalogDomainFilter','catalogSubcategoryFilter', false); renderCatalogPage(); });
  ['catalogSubcategoryFilter','catalogSort','catalogPeriod','catalogBadgeFilter'].forEach(id=>document.getElementById(id).addEventListener('change', renderCatalogPage));
  ['ingredientDomainFilter','ingredientSort','ingredientPeriod'].forEach(id=>document.getElementById(id).addEventListener('change', renderIngredientPage));
  ['rankingDomainFilter','rankingSort','rankingPeriod'].forEach(id=>document.getElementById(id).addEventListener('change', renderRankingPage));
  document.getElementById('pageTitle').addEventListener('dblclick', showAdminAccess);
  window.addEventListener('keydown', e=>{ if(e.ctrlKey && e.shiftKey && String(e.key).toLowerCase()==='a'){ e.preventDefault(); showAdminAccess(); }});
  document.getElementById('modal').addEventListener('click', e=>{ if(e.target.id==='modal') closeModal(); });
}

init();
</script>
