<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beauty & Health Demo v17</title>
<style>
:root{--bg:#f5f7fb;--card:#fff;--line:#d9e0ea;--text:#1f2937;--muted:#6b7280;--primary:#2563eb;--good:#16a34a;--warn:#d97706;--bad:#dc2626;--story:#7c3aed;--mongolia:#b45309;--shadow:0 8px 24px rgba(0,0,0,.08);--radius:16px}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;padding:24px 320px 24px 24px;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
.container{max-width:1360px;margin:auto}
h1{margin:0 0 8px}
h2{margin:0 0 12px;font-size:22px}
h3{margin:0 0 10px;font-size:18px}
.card{background:var(--card);padding:20px;border-radius:var(--radius);margin-top:16px;box-shadow:var(--shadow);border:1px solid var(--line)}
.lead,.mini-note{color:var(--muted);line-height:1.7}
.mini-note{font-size:12px}
.page-title-row{display:grid;grid-template-columns:1fr auto;gap:16px;align-items:start}
.lang-switch{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.nav,.subtabs{display:flex;gap:10px;flex-wrap:wrap}
.nav{margin-top:16px;position:sticky;top:0;background:rgba(245,247,251,.96);padding:10px 0;backdrop-filter:blur(8px);z-index:20}
button,.nav-btn,.subtab-btn,.lang-btn{padding:12px 16px;min-height:46px;border-radius:12px;border:1px solid #c7d2fe;background:#eef2ff;color:#1d4ed8;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;line-height:1.2;white-space:nowrap}
button.primary,.nav-btn.active,.subtab-btn.active,.lang-btn.active{background:var(--primary);border-color:var(--primary);color:#fff}
button{margin-top:14px}
.inline-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.ghost-btn{background:#fff;color:#1d4ed8}
.danger{background:#b91c1c!important;border-color:#b91c1c!important;color:#fff!important}
label{display:block;font-weight:700;margin-top:8px}
select,textarea,input[type=text],input[type=url],input[type=file],input[type=password]{width:100%;padding:12px;border-radius:10px;border:1px solid #cfd7e3;margin-top:8px;font-size:14px;background:#fff}
textarea{min-height:120px;resize:vertical;line-height:1.7}
.page{display:none}.page.active{display:block}
.result{background:#f8fbff;padding:16px;border-radius:12px;border:1px solid #dbeafe;margin-top:12px;line-height:1.8}
.pill-grid{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px}
.pill{border:1px solid #c7d2fe;background:#eef2ff;color:#1d4ed8;border-radius:999px;padding:10px 14px;cursor:pointer;font-weight:700;font-size:14px;user-select:none}
.pill.active{background:var(--primary);border-color:var(--primary);color:#fff}
.tag{display:inline-block;background:#eef2ff;color:#1d4ed8;padding:6px 10px;border-radius:999px;margin:4px 6px 0 0;font-size:12px;font-weight:700;border:1px solid #c7d2fe}
.tag.good{background:#ecfdf5;color:#166534;border-color:#a7f3d0}
.tag.story{background:#f5f3ff;color:#6d28d9;border-color:#c4b5fd}
.tag.mongolia{background:#fffbeb;color:#b45309;border-color:#f59e0b}
.question-row{display:grid;grid-template-columns:180px 1fr 42px;gap:12px;align-items:center;margin-top:12px}
.question-row input[type=range]{width:100%}
.range-value{text-align:center;font-weight:800;color:var(--primary)}
.preview-wrap,.compare-columns,.image-grid,.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.preview-box,.compare-panel{border:1px solid var(--line);border-radius:12px;padding:12px;background:#fff}
.preview-image,.preview-canvas,.detail-image{width:100%;border-radius:10px;border:1px solid var(--line);background:#fff;display:none}
.detail-image{display:block}
.product{position:relative;border:1px solid var(--line);border-radius:12px;padding:14px;margin-top:12px;background:#fff;overflow:hidden;cursor:pointer}
.product-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.product-stamp{display:inline-flex;align-items:center;justify-content:center;min-width:120px;min-height:72px;padding:10px 12px;border:3px solid currentColor;border-radius:14px;font-size:18px;font-weight:900;letter-spacing:.04em;transform:rotate(8deg);text-align:center;background:rgba(255,255,255,.92)}
.stamp-mongolia{color:#b45309;background:#fffbeb;border-color:#f59e0b}
.stamp-story{color:#6d28d9;background:#f5f3ff;border-color:#a78bfa}
.stamp-custom{color:#be123c;background:#fff1f2;border-color:#fb7185}
.scorebar{margin-top:12px}
.scorebar-head{display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-bottom:4px}
.scorebar-outer{height:14px;border-radius:999px;background:#e5e7eb;overflow:hidden}
.scorebar-inner{height:100%;background:var(--primary)}
#cropStage{position:relative;display:inline-block;width:100%;cursor:crosshair}
#ingredientPreview{pointer-events:none}
#cropBox{display:none;position:absolute;border:2px solid #2563eb;background:rgba(37,99,235,.12);pointer-events:none}
.status-line{font-size:13px;color:var(--muted);white-space:pre-wrap;margin-top:8px}
.story-strip{margin-top:14px;padding:12px 14px;border:1px solid #fde68a;background:#fffbeb;border-radius:12px;color:#92400e;font-weight:700}
.side-ad{position:fixed;right:16px;top:88px;width:280px;background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:18px;z-index:10}
.side-ad h3{margin:0 0 10px;font-size:20px;line-height:1.5}
.side-ad p{margin:0;color:var(--muted);line-height:1.8}
.side-ad .ad-badge{display:inline-block;padding:6px 10px;border-radius:999px;background:#eef2ff;color:#1d4ed8;border:1px solid #c7d2fe;font-size:12px;font-weight:700;margin-bottom:10px}
.top-fab{position:fixed;right:12px;bottom:12px;z-index:30;border:0;border-radius:999px;background:var(--primary);color:#fff;min-width:52px}
.modal{position:fixed;inset:0;background:rgba(15,23,42,.55);display:none;align-items:center;justify-content:center;padding:24px;z-index:9999}
.modal.active{display:flex}
.modal-content{background:#fff;width:min(1280px,100%);max-height:96vh;overflow:auto;border-radius:18px;padding:16px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:12px}
.action-hint{margin-top:10px;display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;background:#eff6ff;border:1px solid #bfdbfe;color:#1d4ed8;font-size:12px;font-weight:800}
.product:hover .action-hint{text-decoration:underline}

.detail-score-note{margin-top:8px;font-size:12px;color:var(--muted);line-height:1.6}
.detail-compare-table,.single-detail-table{display:flex;flex-direction:column;gap:6px}
.detail-compare-head,.detail-compare-row{display:grid;grid-template-columns:minmax(0,1fr) 168px minmax(0,1fr);gap:8px;align-items:center}
.detail-compare-head{font-size:12px;color:var(--muted);font-weight:800}
.detail-compare-cell{border:1px solid var(--line);border-radius:12px;padding:8px 10px;background:#fff}
.detail-compare-side-title{font-weight:800;margin-bottom:4px;font-size:12px;color:var(--muted)}
.detail-compare-scoreline{display:grid;grid-template-columns:44px 1fr;gap:8px;align-items:center}
.detail-compare-score,.single-detail-score{font-size:18px;font-weight:900;color:var(--primary);line-height:1;text-align:right}
.detail-compare-bar,.single-detail-bar{height:12px;border-radius:999px;background:#e5e7eb;overflow:hidden}
.detail-compare-fill,.single-detail-fill{height:100%;background:var(--primary)}
.detail-compare-metric-btn,.single-detail-metric-btn{width:100%;border:1px solid #cbd5e1;background:#f8fafc;color:var(--text);border-radius:12px;padding:10px 8px;font-weight:900;cursor:pointer;margin:0;min-height:0}
.detail-compare-metric-btn:hover,.single-detail-metric-btn:hover{background:#eff6ff;border-color:#93c5fd;color:#1d4ed8}
.single-detail-row{display:grid;grid-template-columns:160px 54px 1fr;gap:8px;align-items:center}
.single-detail-table .single-detail-row + .single-detail-row{margin-top:4px}
.compare-comment p{margin:10px 0 0;line-height:1.8}
.contrib-popup{position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;padding:20px;z-index:10001}
.contrib-popup.active{display:flex}
.contrib-popup-card{background:#fff;width:min(700px,100%);max-height:80vh;overflow:auto;border-radius:16px;padding:18px;border:1px solid var(--line);box-shadow:0 20px 60px rgba(0,0,0,.2)}
.contrib-popup-head{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:10px}
.contrib-popup-section{border:1px solid var(--line);border-radius:12px;padding:12px;background:#fff;margin-top:10px}
.contrib-popup-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.contrib-popup-close{margin-top:0}
@media (max-width:1020px){.detail-compare-head{display:none}.detail-compare-row{grid-template-columns:1fr}.detail-compare-cell,.detail-compare-metric-btn{width:100%}.single-detail-row{grid-template-columns:120px 46px 1fr}}

.hidden{display:none!important}
@media (max-width:1300px){body{padding-right:24px}.side-ad{position:relative;right:auto;top:auto;width:auto;margin:16px 0 0 0}}
@media (max-width:1020px){.grid-2,.grid-3,.preview-wrap,.compare-columns,.image-grid,.page-title-row,.admin-grid{grid-template-columns:1fr}.question-row{grid-template-columns:1fr}.modal{padding:12px}}
</style>
</head>
<body>
<button class="top-fab" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
<aside class="side-ad">
  <div class="ad-badge" data-i18n="adBadge">広告</div>
  <h3 data-i18n="adHeadline"></h3>
  <p data-i18n="adBody"></p>
  <button class="primary" onclick="showPage('mongolia')" data-i18n="adButton"></button>
</aside>

<div class="container">
  <div class="page-title-row">
    <div>
      <h1 id="pageTitle" data-i18n="pageTitle"></h1>
      <p class="lead" data-i18n="pageLead"></p>
    </div>
    <div class="lang-switch">
      <button class="lang-btn active" id="langJa" onclick="switchLang('ja')">日本語</button>
      <button class="lang-btn" id="langEn" onclick="switchLang('en')">English</button>
      <button class="lang-btn" id="langZh" onclick="switchLang('zh')">中文</button>
      <button class="ghost-btn" onclick="showAdminAccess()" data-i18n="openAdmin"></button>
    </div>
  </div>

  <div class="nav">
    <button class="nav-btn active" data-page="builder" onclick="showPage('builder')" data-i18n="navBuilder"></button>
    <button class="nav-btn" data-page="catalog" onclick="showPage('catalog')" data-i18n="navCatalog"></button>
    <button class="nav-btn" data-page="ingredients" onclick="showPage('ingredients')" data-i18n="navIngredients"></button>
    <button class="nav-btn" data-page="ranking" onclick="showPage('ranking')" data-i18n="navRanking"></button>
    <button class="nav-btn" data-page="mongolia" onclick="showPage('mongolia')" data-i18n="navMongolia"></button>
  </div>

  <section id="builder" class="page active">
    <div class="card">
      <h2 data-i18n="section1"></h2>
      <div class="grid-3">
        <div><label data-i18n="domain"></label><select id="domainSelect"></select></div>
        <div><label data-i18n="subcategory"></label><select id="subcategorySelect"></select></div>
        <div><label data-i18n="usage"></label><select id="usageTimeSelect"></select></div>
      </div>
    </div>

    <div class="card">
      <h2 data-i18n="section2"></h2>
      <div class="grid-2">
        <div>
          <div id="questionArea"></div>
          <div class="inline-actions">
            <button class="primary" onclick="diagnoseFromQuestions()" data-i18n="diagnose"></button>
            <button onclick="shareDiagnosis()" data-i18n="shareDiagnosis"></button>
          </div>
        </div>
        <div>
          <div id="diagnosisResult" class="result"></div>
          <div class="preview-box" style="margin-top:12px"><canvas id="radarCanvas" width="360" height="360" style="width:100%;max-width:360px;display:block;margin:auto"></canvas></div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2 data-i18n="section3"></h2>
      <div class="grid-2">
        <div><label data-i18n="texture"></label><select id="textureSelect"></select></div>
        <div><label data-i18n="philosophy"></label><select id="philosophySelect"></select></div>
      </div>
      <div style="margin-top:12px"><b data-i18n="avoid"></b></div>
      <div id="avoidPills" class="pill-grid"></div>
      <div class="inline-actions">
        <button class="primary" onclick="buildIdealFormula()" data-i18n="build"></button>
        <button onclick="resetBuilder()" data-i18n="reset"></button>
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <h2 data-i18n="section4"></h2>
        <div id="recommendedIngredients"></div>
      </div>
      <div class="card">
        <h2 data-i18n="section5"></h2>
        <div id="formulaSummary"></div>
        <div id="barGraphArea"></div>
        <div class="inline-actions">
          <button class="primary" onclick="saveFormulaToRanking()" data-i18n="saveRanking"></button>
          <button onclick="shareCurrentFormula()" data-i18n="share"></button>
        </div>
      </div>
    </div>

    <div class="card">
      <h2 data-i18n="section6"></h2>
      <div id="idealCompareBox"></div>
    </div>

    <div class="card">
      <h2 data-i18n="section7"></h2>
      <div class="grid-2">
        <div>
          <label data-i18n="productName"></label><input id="uploadProductName" type="text">
          <label data-i18n="brand"></label><input id="uploadBrandName" type="text">
          <label data-i18n="overallImage"></label><input id="overallImageInput" type="file" accept="image/*">
          <label data-i18n="ingredientImage"></label><input id="ingredientImageInput" type="file" accept="image/*">
          <div class="inline-actions">
            <button onclick="resetCropSelection()" data-i18n="selectRangeReset"></button>
            <button onclick="selectWholeImage()" data-i18n="selectWholeImage"></button>
          </div>
          <label data-i18n="ocrManual"></label><textarea id="ocrManualInput"></textarea>
          <div id="ocrStatus" class="status-line"></div>
          <div class="inline-actions">
            <button class="primary" onclick="analyzeUploadedIngredients()" data-i18n="analyze"></button>
            <button onclick="saveUploadedProduct()" data-i18n="saveUploaded"></button>
          </div>
        </div>
        <div>
          <div class="preview-wrap">
            <div class="preview-box"><h4 data-i18n="previewOverall"></h4><img id="overallPreview" class="preview-image" alt=""></div>
            <div class="preview-box"><h4 data-i18n="previewIngredient"></h4><div id="cropStage"><img id="ingredientPreview" class="preview-image" alt=""><div id="cropBox"></div></div></div>
          </div>
          <div class="preview-wrap" style="margin-top:12px">
            <div class="preview-box"><h4 data-i18n="ocrProcessed"></h4><canvas id="processedCanvas" class="preview-canvas" width="320" height="320"></canvas></div>
            <div class="preview-box"><h4 data-i18n="ocrResult"></h4><div id="ocrResultBox" class="result"></div></div>
          </div>
        </div>
      </div>
      <div id="uploadedCompareBox"></div>
    </div>
  </section>

  <section id="catalog" class="page">
    <div class="card">
      <h2 data-i18n="catalogTitle"></h2>
      <div class="grid-3">
        <div><label data-i18n="domain"></label><select id="catalogDomainFilter"></select></div>
        <div><label data-i18n="subcategory"></label><select id="catalogSubcategoryFilter"></select></div>
        <div><label data-i18n="sort"></label><select id="catalogSort"></select></div>
      </div>
      <div class="grid-2">
        <div><label data-i18n="period"></label><select id="catalogPeriod"></select></div>
        <div><label data-i18n="badgeFilter"></label><select id="catalogBadgeFilter"></select></div>
      </div>
      <div class="grid-2">
        <div><label data-i18n="search"></label><input id="catalogSearch" type="text"></div>
        <div><label data-i18n="tagsLabel"></label><select id="catalogTagFilter"></select></div>
      </div>
      <div id="catalogList"></div>
    </div>
  </section>

  <section id="ingredients" class="page">
    <div class="card">
      <h2 data-i18n="ingredientsTitle"></h2>
      <div class="grid-3">
        <div><label data-i18n="domain"></label><select id="ingredientDomainFilter"></select></div>
        <div><label data-i18n="sort"></label><select id="ingredientSort"></select></div>
        <div><label data-i18n="period"></label><select id="ingredientPeriod"></select></div>
      </div>
      <div class="grid-2">
        <div><label data-i18n="search"></label><input id="ingredientSearch" type="text"></div>
        <div><label data-i18n="tagsLabel"></label><select id="ingredientTagFilter"></select></div>
      </div>
      <div id="ingredientList"></div>
    </div>
  </section>

  <section id="ranking" class="page">
    <div class="card">
      <h2 data-i18n="rankingTitle"></h2>
      <div class="subtabs">
        <button class="subtab-btn active" data-ranktab="formula" onclick="switchRankingTab('formula')" data-i18n="tabFormula"></button>
        <button class="subtab-btn" data-ranktab="product" onclick="switchRankingTab('product')" data-i18n="tabProduct"></button>
        <button class="subtab-btn" data-ranktab="ingredient" onclick="switchRankingTab('ingredient')" data-i18n="tabIngredient"></button>
      </div>
      <div class="grid-3">
        <div><label data-i18n="domain"></label><select id="rankingDomainFilter"></select></div>
        <div><label data-i18n="sort"></label><select id="rankingSort"></select></div>
        <div><label data-i18n="period"></label><select id="rankingPeriod"></select></div>
      </div>
      <div class="grid-2">
        <div><label data-i18n="search"></label><input id="rankingSearch" type="text"></div>
        <div><label data-i18n="tagsLabel"></label><select id="rankingTagFilter"></select></div>
      </div>
      <div id="rankingList"></div>
    </div>
  </section>

  <section id="mongolia" class="page">
    <div class="card">
      <h2 data-i18n="mongoliaTitle"></h2>
      <div class="result" data-i18n="mongoliaIntro"></div>
      <div id="mongoliaFeatureList"></div>
    </div>
  </section>

  <section id="admin" class="page">
    <div class="card">
      <h2 data-i18n="adminTitle"></h2>
      <div id="adminLoginBox">
        <label data-i18n="adminPassword"></label>
        <input id="adminPassword" type="password">
        <div class="inline-actions">
          <button class="primary" onclick="unlockAdmin()" data-i18n="login"></button>
          <button onclick="resetAllData()" data-i18n="resetData"></button>
        </div>
        <div class="mini-note">admin123</div>
      </div>
      <div id="adminBody" class="hidden">
        <div class="admin-grid">
          <div class="card" style="margin-top:0"><h3 data-i18n="productsExcel"></h3><input id="productExcelInput" type="file" accept=".xlsx,.xls"><button onclick="importProductsExcel()" data-i18n="import"></button></div>
          <div class="card" style="margin-top:0"><h3 data-i18n="ingredientsExcel"></h3><input id="ingredientExcelInput" type="file" accept=".xlsx,.xls"><button onclick="importIngredientsExcel()" data-i18n="import"></button></div>
          <div class="card" style="margin-top:0"><h3 data-i18n="ocrExcel"></h3><input id="ocrExcelInput" type="file" accept=".xlsx,.xls"><button onclick="importOcrCorrectionsExcel()" data-i18n="import"></button></div>
        </div>
        <div class="inline-actions">
          <button onclick="exportProductsTemplate()" data-i18n="exportProducts"></button>
          <button onclick="exportIngredientsTemplate()" data-i18n="exportIngredients"></button>
          <button onclick="exportOcrTemplate()" data-i18n="exportOcr"></button>
        </div>
        <div id="excelImportStatus" class="result"></div>
        <h3 data-i18n="pending"></h3>
        <div id="pendingProducts"></div>
      </div>
    </div>
  </section>
</div>

<div id="modal" class="modal">
  <div class="modal-content">
    <div class="modal-top">
      <h2 id="modalTitle"></h2>
      <div class="inline-actions" style="margin-top:0">
        <button onclick="shareCurrentModal()" data-i18n="share"></button>
        <button class="primary" onclick="closeModal()" data-i18n="close"></button>
      </div>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<div id="contribPopup" class="contrib-popup">
  <div class="contrib-popup-card">
    <div class="contrib-popup-head">
      <h3 id="contribPopupTitle"></h3>
      <button class="primary contrib-popup-close" onclick="closeContributionPopup()">閉じる</button>
    </div>
    <div id="contribPopupBody"></div>
  </div>

function trEntity(text){ const s = String(text ?? ''); const m = ENTITY_TRANSLATIONS[s] || FUNCTION_TAG_TRANSLATIONS[s]; return m ? (m[state.lang] || m.ja || s) : s; }
function productDisplayName(p){ return trEntity(p.name || ''); }
function productDisplayBrand(p){ return trEntity(p.brand || ''); }

function allIngredientEntries(){ return Object.entries(state.ingredients || {}); }
function normalizeIngredientLookupText(value){
  return String(value || '')
    .normalize('NFKC')
    .replace(/[　\s]+/g,'')
    .replace(/[·•･・]/g,'')
    .replace(/[※＊*]/g,'')
    .replace(/[“”"'`´]/g,'')
    .replace(/[＜＞<>【】\[\]{}]/g,'')
    .replace(/[()（）]/g,'')
    .replace(/[,:：;；]/g,'')
    .replace(/[／\/]/g,'')
    .trim();
}
function ingredientLookupCandidates(ref){
  const raw = String(ref || '').trim();
  if(!raw) return [];
  const base = raw
    .replace(/^全成分[:：]?/,'')
    .replace(/^成分[:：]?/,'')
    .replace(/^配合成分[:：]?/,'')
    .replace(/^\d+[.)．、]\s*/,'')
    .replace(/^[・･•·\-－―]+/,'')
    .trim();
  const variants = new Set([raw, base]);
  const noBracket = base.replace(/（[^）]*）/g,'').replace(/\([^)]*\)/g,'').trim();
  if(noBracket) variants.add(noBracket);
  [base, noBracket].forEach(v=>{
    const s = String(v || '').trim();
    if(!s) return;
    variants.add(s.replace(/末$/,''));
    variants.add(s.replace(/粉末$/,''));
    variants.add(s.replace(/エキス末$/,'エキス'));
    variants.add(s.replace(/抽出物$/,'エキス'));
    variants.add(s.replace(/配合$/,''));
    variants.add(s.replace(/Na$/,'ナトリウム'));
    variants.add(s.replace(/ナトリウム$/,'Na'));
  });
  const normalized = [...variants].map(v=>normalizeIngredientLookupText(v)).filter(Boolean);
  return [...new Set(normalized)];
}
function ingredientSearchIndex(){
  const index = new Map();
  allIngredientEntries().forEach(([key, value])=>{
    const rec = {key, ...value};
    [key, value?.nameJa, value?.nameEn, value?.nameZh, ...(value?.aliases || [])].forEach(name=>{
      ingredientLookupCandidates(name).forEach(candidate=>{
        if(!index.has(candidate)) index.set(candidate, []);
        index.get(candidate).push(rec);
      });
    });
  });
  return index;
}
function chooseIngredientRecord(matches, domainPref){
  if(!(matches || []).length) return null;
  if(domainPref){
    const exactDomain = matches.find(rec=>rec.domain===domainPref);
    if(exactDomain) return exactDomain;
  }
  return matches[0] || null;
}
function getIngredientRecord(ref, domainPref){
  if(ref == null) return null;
  const raw = String(ref).trim();
  if(!raw) return null;
  const direct = state.ingredients?.[raw];
  if(direct && (!domainPref || direct.domain===domainPref)) return {key:raw, ...direct};
  const index = ingredientSearchIndex();
  const candidateKeys = ingredientLookupCandidates(raw);
  for(const candidate of candidateKeys){
    const found = chooseIngredientRecord(index.get(candidate), domainPref);
    if(found) return found;
  }
  for(const candidate of candidateKeys){
    const partialMatches = [];
    for(const [indexKey, records] of index.entries()){
      if(candidate.length < 3 || indexKey.length < 3) continue;
      if(indexKey.includes(candidate) || candidate.includes(indexKey)) partialMatches.push(...records);
    }
    const found = chooseIngredientRecord(partialMatches, domainPref);
    if(found) return found;
  }
  return direct ? {key:raw, ...direct} : null;
}
function ingredientDisplayName(ref, domainPref){ const rec = getIngredientRecord(ref, domainPref); if(rec){ return state.lang==='en' ? (rec.nameEn || rec.nameJa || String(ref)) : state.lang==='zh' ? (rec.nameZh || rec.nameJa || String(ref)) : (rec.nameJa || String(ref)); } return trEntity(ref); }

function calcDetailedScores(items, domain){
  const keys = getDetailedScoreKeys(domain);
  return buildDetailedScoreRows(items, domain, keys).filter(entry=>entry.raw > 0).sort((a,b)=>b.raw-a.raw || String(a.label).localeCompare(String(b.label),'ja'));
}
function buildDetailedScoreRows(items, domain, keys){
  const rowKeys = keys && keys.length ? [...keys] : getDetailedScoreKeys(domain);
  return rowKeys.map(key=>{
    let total = 0;
    const contributors = [];
    (items || []).forEach(item=>{
      const value = Number(((item || {}).scores || {})[key] || 0);
      total += value;
      if(value > 0){
        const ref = item.name || item.key || item.nameJa || key;
        contributors.push({name: ingredientDisplayName(ref, domain), value});
      }
    });
    contributors.sort((a,b)=>b.value-a.value || String(a.name).localeCompare(String(b.name),'ja'));
    return {
      key,
      label:key,
      raw:total,
      score:total,
      count:contributors.length,
      contributors
    };
  });
}

function diagnoseFromQuestions(){
  const domain = document.getElementById('domainSelect').value||'cosmetics';
  let diagnosis='', concerns=[];
  if(domain==='cosmetics'){
    const a = state.answers;
    diagnosis = a.sensitivity>=4 ? (state.lang==='en'?'Sensitive skin':state.lang==='zh'?'敏感肌':'敏感肌') :
      a.dryness>=4 && a.oiliness<=2 ? (state.lang==='en'?'Dry skin':state.lang==='zh'?'干燥肌':'乾燥肌') :
      a.oiliness>=4 && a.dryness<=2 ? (state.lang==='en'?'Oily skin':state.lang==='zh'?'油性肌':'脂性肌') :
      (state.lang==='en'?'Combination skin':state.lang==='zh'?'混合肌':'混合肌');
    if(a.dryness>=4) concerns.push('乾燥');
    if(a.sensitivity>=4) concerns.push('敏感');
    if(a.dullness>=4) concerns.push('透明感');
    if(a.firmness>=4) concerns.push('ハリ');
    if(!concerns.length) concerns.push('バランス');
  } else {
    const a = state.answers;
    diagnosis = a.rest>=4 ? (state.lang==='en'?'Rest focused':state.lang==='zh'?'休息重点':'休息重視') :
      a.energy>=4 ? (state.lang==='en'?'Energy focused':state.lang==='zh'?'活力重点':'活力重視') :
      a.beauty>=4 ? (state.lang==='en'?'Beauty focused':state.lang==='zh'?'美容重点':'美容重視') :
      a.gut>=4 ? (state.lang==='en'?'Gut focused':state.lang==='zh'?'肠道重点':'腸活重視') :
      (state.lang==='en'?'Balanced':state.lang==='zh'?'平衡重点':'バランス重視');
    if(a.rest>=4) concerns.push('休息');
    if(a.energy>=4) concerns.push('活力');
    if(a.beauty>=4) concerns.push('美容');
    if(a.gut>=4) concerns.push('腸活');
    if(!concerns.length) concerns.push('栄養');
  }
  state.currentDiagnosis = {diagnosis, concerns, domain};
  document.getElementById('diagnosisResult').innerHTML = `<div><b>${t('diagnosisResult')}:</b> ${escapeHtml(diagnosis)}</div><div style="margin-top:8px"><b>${t('concerns')}:</b> ${concerns.map(v=>`<span class="tag">${escapeHtml(v)}</span>`).join('')}</div>`;
}


function ingredientMatchesConcern(ref, domain, concerns){
  const ing = getIngredientRecord(ref, domain); if(!ing || ing.domain!==domain) return false;
  const dims = ing.dimensions || {};
  const score = (k)=>Number(dims[k] || 0);
  if(domain==='cosmetics'){
    if(concerns.includes('乾燥') && (score('moisture')>=18 || score('barrier')>=18)) return true;
    if(concerns.includes('敏感') && (score('soothing')>=18 || score('barrier')>=18)) return true;
    if(concerns.includes('透明感') && score('brightening')>=18) return true;
    if(concerns.includes('ハリ') && score('firmness')>=18) return true;
    return concerns.includes('バランス');
  }
  if(concerns.includes('休息') && score('rest')>=18) return true;
  if(concerns.includes('活力') && score('energy')>=18) return true;
  if(concerns.includes('美容') && score('beauty')>=18) return true;
  if(concerns.includes('腸活') && score('gut')>=18) return true;
  return concerns.includes('栄養');
}

function buildIdealFormula(){
  if(!state.currentDiagnosis) diagnoseFromQuestions();
  const domain = document.getElementById('domainSelect').value||'cosmetics';
  const names = Object.keys(state.ingredients).filter(n=>state.ingredients[n].domain===domain);
  state.recommendedIngredients = names.filter(n=>ingredientMatchesConcern(n, domain, state.currentDiagnosis.concerns)).slice(0,8);
  if(!state.recommendedIngredients.length) state.recommendedIngredients = names.slice(0,5);
  state.selectedIngredients = [...state.recommendedIngredients];
  renderRecommendedIngredients();
  refreshFormulaOutputs();

function analyzeIngredientNames(names, domainPref){ return (names||[]).map(n=>{ const rec = getIngredientRecord(n, domainPref); return rec ? {name:n, ...rec} : {name:n, nameJa:String(n), dimensions:{}, scores:{}, unmatched:true}; }); }
function calcMetrics(items, domain){
  const defs = domain==='health'
    ? [{key:'energy',label:{ja:'活力',en:'Energy',zh:'活力'}},{key:'rest',label:{ja:'休息',en:'Rest',zh:'休息'}},{key:'beauty',label:{ja:'美容',en:'Beauty',zh:'美容'}},{key:'gut',label:{ja:'腸活',en:'Gut',zh:'肠道'}},{key:'balance',label:{ja:'バランス',en:'Balance',zh:'平衡'}}]
    : [{key:'moisture',label:{ja:'保湿',en:'Moisture',zh:'保湿'}},{key:'barrier',label:{ja:'バリア',en:'Barrier',zh:'屏障'}},{key:'brightening',label:{ja:'透明感',en:'Brightness',zh:'透亮'}},{key:'firmness',label:{ja:'ハリ',en:'Firmness',zh:'弹力'}},{key:'soothing',label:{ja:'整肌',en:'Soothing',zh:'舒缓'}}];
  return defs.map(def=>{ let score=0, count=0; items.forEach(item=>{ const v = (item.dimensions||{})[def.key]||0; score += v; if(v>0) count += 1; }); return {key:def.key,label:optionLabel(def.label),score:Math.max(0,Math.min(100,score)),count}; });
}
function renderMetricBars(metrics){ return metrics.map(m=>`<div class="scorebar"><div class="scorebar-head"><span>${escapeHtml(m.label)} ${m.count}</span><span>${m.score}</span></div><div class="scorebar-outer"><div class="scorebar-inner" style="width:${m.score}%"></div></div></div>`).join(''); }
function refreshFormulaOutputs(){

function compareAgainstIdeal(prod){
  if(!state.currentFormula) return null;
  const ideal = new Set((state.currentFormula.ingredients || []).map(v=>ingredientCanonicalName(v, state.currentFormula.domain)));
  const actual = new Set((prod.ingredients || []).map(v=>ingredientCanonicalName(v, prod.domain)));
  const overlap = [...ideal].filter(v=>actual.has(v));
  const missing = [...ideal].filter(v=>!actual.has(v));
  const extra = [...actual].filter(v=>!ideal.has(v));
  return {overlap, missing, extra, score:Math.max(0,Math.min(100, overlap.length*18 - missing.length*5 - extra.length*3 + 40))};
}
function getApprovedProducts(){ return [...state.products, ...state.importedProducts.filter(v=>v.status==='approved')]; }
function renderIdealComparisons(){
  const box = document.getElementById('idealCompareBox');
  if(!state.currentFormula){ box.innerHTML = `<div class="result">${t('noCompare')}</div>`; return; }
  const exact = getApprovedProducts().filter(p=>p.domain===state.currentFormula.domain && p.subcategory===state.currentFormula.subcategory);
  const usedFallback = !exact.length;
  const source = exact.length ? exact : getApprovedProducts().filter(p=>p.domain===state.currentFormula.domain);
  const cards = source.slice(0,3).map(p=>{
    const cmp = compareAgainstIdeal(p);
    return `<div class="product" onclick="openCompareWithProduct('${p.id}')"><div class="product-head"><div><div><span class="tag">${domainLabel(p.domain)}</span><span class="tag">${escapeHtml(subcategoryLabel(p.subcategory||''))}</span></div><h3 style="margin-top:8px">${escapeHtml(p.name)}</h3><div class="mini-note">${escapeHtml(p.brand||'')}</div><div style="margin-top:8px">${cmp.overlap.map(v=>`<span class="tag good">${escapeHtml(ingredientDisplayName(v))}</span>`).join('')}</div><div class="mini-note">${t('comparePromo')}</div>${detailHintHtml('compare')}</div>${storyStamp(p)}</div></div>`;
  }).join('');
  box.innerHTML = (usedFallback && source.length ? `<div class="result">${t('compareFallback')}</div>` : '') + (source.length ? cards : `<div class="result">${t('noCatalog')}</div>`);
}

function storyStamp(p){ if(!p.storyBadge) return ''; const cls = p.storyBadge===t('badgeMongolia') || p.storyBadge==='モンゴルブランド' || p.storyBadge==='Mongolia Brand' || p.storyBadge==='蒙古品牌' ? 'stamp-mongolia' : (p.storyBadge===t('badgeStory') || p.storyBadge==='原料ストーリーあり' ? 'stamp-story' : 'stamp-custom'); return `<div class="product-stamp ${cls}">${escapeHtml(p.storyBadge)}</div>`; }

function loadPreview(file, target){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    target.onload = () => {
      target.style.display = 'block';
      if(target.id==='ingredientPreview'){
        selectWholeImage();
        document.getElementById('ocrManualInput').value = '';
        document.getElementById('ocrResultBox').textContent = '';
        document.getElementById('ocrStatus').textContent = t('ocrNeedManual');
        document.getElementById('uploadedCompareBox').innerHTML = '';
        state.currentUploadedProduct = null;
        renderProcessedSelectionPreview();
      }
    };
    target.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
function bindImageInputs(){
  document.getElementById('overallImageInput').addEventListener('change', e=>loadPreview(e.target.files[0], document.getElementById('overallPreview')));
  document.getElementById('ingredientImageInput').addEventListener('change', e=>loadPreview(e.target.files[0], document.getElementById('ingredientPreview')));
  const stage = document.getElementById('cropStage');
  stage.addEventListener('mousedown', startCrop);
  window.addEventListener('mousemove', moveCrop);
  window.addEventListener('mouseup', endCrop);
}
function getCropImageMetrics(){
  const preview = document.getElementById('ingredientPreview');
  if(!preview || !preview.src || !preview.naturalWidth || !preview.naturalHeight) return null;
  const stageRect = document.getElementById('cropStage').getBoundingClientRect();
  const imgRect = preview.getBoundingClientRect();
  return {
    preview,
    stageRect,
    left: imgRect.left - stageRect.left,
    top: imgRect.top - stageRect.top,
    width: imgRect.width,
    height: imgRect.height,
    naturalWidth: preview.naturalWidth,
    naturalHeight: preview.naturalHeight
  };
}
function clampCropToImage(crop, metrics){
  if(!crop || !metrics) return null;
  const left = Math.max(metrics.left, Math.min(crop.x, metrics.left + metrics.width));
  const top = Math.max(metrics.top, Math.min(crop.y, metrics.top + metrics.height));
  const right = Math.max(metrics.left, Math.min(crop.x + crop.width, metrics.left + metrics.width));
  const bottom = Math.max(metrics.top, Math.min(crop.y + crop.height, metrics.top + metrics.height));
  return {x:left, y:top, width:Math.max(1, right-left), height:Math.max(1, bottom-top)};
}
function selectWholeImage(){
  const metrics = getCropImageMetrics();
  if(!metrics) return;
  state.crop = {x:metrics.left, y:metrics.top, width:metrics.width, height:metrics.height};
  drawCropBox();
  renderProcessedSelectionPreview();
}
function resetCropSelection(){ state.crop = null; drawCropBox(); renderProcessedSelectionPreview(); }
function startCrop(e){
  const metrics = getCropImageMetrics();
  if(!metrics) return;
  const stageX = e.clientX - metrics.stageRect.left;
  const stageY = e.clientY - metrics.stageRect.top;
  if(stageX<metrics.left||stageX>metrics.left+metrics.width||stageY<metrics.top||stageY>metrics.top+metrics.height) return;
  state.dragging = true;
  state.dragStart = {x:stageX, y:stageY};
  state.crop = {x:stageX, y:stageY, width:1, height:1};
  drawCropBox();
}
function moveCrop(e){
  if(!state.dragging || !state.dragStart) return;
  const metrics = getCropImageMetrics();
  if(!metrics) return;
  const stageX = Math.max(metrics.left, Math.min(e.clientX - metrics.stageRect.left, metrics.left + metrics.width));
  const stageY = Math.max(metrics.top, Math.min(e.clientY - metrics.stageRect.top, metrics.top + metrics.height));
  state.crop = clampCropToImage({
    x:Math.min(state.dragStart.x, stageX),
    y:Math.min(state.dragStart.y, stageY),
    width:Math.abs(stageX - state.dragStart.x),
    height:Math.abs(stageY - state.dragStart.y)
  }, metrics);
  drawCropBox();
}
function endCrop(){
  if(state.dragging){
    state.dragging=false;
    state.dragStart=null;
    drawCropBox();
    renderProcessedSelectionPreview();
    return;
  }
  state.dragging=false;
  state.dragStart=null;
}
function drawCropBox(){
  const box = document.getElementById('cropBox');
  const metrics = getCropImageMetrics();
  const crop = clampCropToImage(state.crop, metrics);
  if(!crop){ box.style.display='none'; return; }
  state.crop = crop;
  box.style.display='block';
  box.style.left = crop.x+'px';
  box.style.top = crop.y+'px';
  box.style.width = crop.width+'px';
  box.style.height = crop.height+'px';
}
function getCropRectOnImagePixels(){
  const metrics = getCropImageMetrics();
  if(!metrics) return null;
  const crop = clampCropToImage(state.crop || {x:metrics.left, y:metrics.top, width:metrics.width, height:metrics.height}, metrics);
  const scaleX = metrics.naturalWidth / metrics.width;
  const scaleY = metrics.naturalHeight / metrics.height;
  return {
    preview: metrics.preview,
    x: Math.max(0, Math.round((crop.x - metrics.left) * scaleX)),
    y: Math.max(0, Math.round((crop.y - metrics.top) * scaleY)),
    width: Math.max(1, Math.round(crop.width * scaleX)),
    height: Math.max(1, Math.round(crop.height * scaleY))
  };
}
function findPercentileFromHistogram(hist, total, ratio){
  const target = Math.max(0, Math.min(total, Math.round(total * ratio)));
  let sum = 0;
  for(let i=0;i<hist.length;i++){
    sum += hist[i];
    if(sum >= target) return i;
  }
  return hist.length - 1;
}
function otsuThreshold(hist, total){
  let sum = 0;
  for(let i=0;i<256;i++) sum += i * hist[i];
  let sumB = 0, wB = 0, maxVar = -1, threshold = 128;
  for(let i=0;i<256;i++){
    wB += hist[i];
    if(!wB) continue;
    const wF = total - wB;
    if(!wF) break;
    sumB += i * hist[i];
    const mB = sumB / wB;
    const mF = (sum - sumB) / wF;
    const variance = wB * wF * (mB - mF) * (mB - mF);
    if(variance > maxVar){ maxVar = variance; threshold = i; }
  }
  return threshold;
}
function buildProcessedOcrImage(){
  const crop = getCropRectOnImagePixels();
  const canvas = document.getElementById('processedCanvas');
  const preview = document.getElementById('ingredientPreview');
  if(!crop || !preview || !preview.src){
    canvas.style.display = 'none';
    return '';
  }
  const maxSide = 1800;
  const scale = Math.max(2, Math.min(4, maxSide / Math.max(crop.width, crop.height || 1)));
  canvas.width = Math.max(64, Math.round(crop.width * scale));
  canvas.height = Math.max(64, Math.round(crop.height * scale));
  const ctx = canvas.getContext('2d', {willReadFrequently:true});
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(crop.preview, crop.x, crop.y, crop.width, crop.height, 0, 0, canvas.width, canvas.height);
  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = imageData.data;
  const hist = new Array(256).fill(0);
  for(let i=0;i<data.length;i+=4){
    const lum = Math.round(data[i]*0.299 + data[i+1]*0.587 + data[i+2]*0.114);
    hist[lum]++;
  }
  const total = canvas.width * canvas.height;
  const low = findPercentileFromHistogram(hist, total, 0.02);
  const high = Math.max(low + 1, findPercentileFromHistogram(hist, total, 0.98));
  const adjustedHist = new Array(256).fill(0);
  for(let i=0;i<data.length;i+=4){
    const lum = data[i]*0.299 + data[i+1]*0.587 + data[i+2]*0.114;
    let v = (lum - low) * 255 / (high - low);
    v = Math.max(0, Math.min(255, v));
    v = Math.max(0, Math.min(255, (v - 128) * 1.35 + 128));
    const g = Math.round(v);
    data[i] = g; data[i+1] = g; data[i+2] = g;
    adjustedHist[g]++;
  }
  const threshold = otsuThreshold(adjustedHist, total);
  let whiteCount = 0;
  for(let i=0;i<data.length;i+=4){
    const v = data[i] >= threshold ? 255 : 0;
    data[i] = v; data[i+1] = v; data[i+2] = v;
    if(v === 255) whiteCount++;
  }
  if(whiteCount < total * 0.45){
    for(let i=0;i<data.length;i+=4){
      const v = 255 - data[i];
      data[i] = v; data[i+1] = v; data[i+2] = v;
    }
  }
  ctx.putImageData(imageData, 0, 0);
  canvas.style.display = 'block';
  return canvas.toDataURL('image/png');
}

function excelRefToIndexes(ref){
  const m = String(ref || '').match(/^([A-Z]+)(\d+)$/i);
  if(!m) return {row:-1,col:-1};
  const letters = m[1].toUpperCase();
  let col = 0;
  for(const ch of letters) col = col*26 + (ch.charCodeAt(0)-64);
  return {row:Number(m[2])-1, col:col-1};
}
function workbookCellValue(workbook, sheetName, ref){
  const pos = excelRefToIndexes(ref);
  const rows = (workbook && workbook.sheets && workbook.sheets[sheetName]) || [];
  return pos.row >= 0 && rows[pos.row] ? rows[pos.row][pos.col] : '';
}
function workbookSheetToObjects(workbook, sheetName, startRow){
  const rows = ((workbook && workbook.sheets && workbook.sheets[sheetName]) || []).slice(Math.max(0, Number(startRow || 0)));
  const nonEmpty = rows.filter(r=>Array.isArray(r) && r.some(v=>String(v ?? '').trim() !== ''));
  const header = (nonEmpty[0] || []).map(v=>String(v ?? '').trim());
  return nonEmpty.slice(1).map(row=>{
    const out = {};
    header.forEach((key, idx)=>{ if(key) out[key] = row[idx] ?? ''; });
    return out;
  });
}
function findWorkbookSheetConfig(workbook, options){
  const cfg = options || {};
  const preferredSheets = Array.isArray(cfg.preferredSheets) ? cfg.preferredSheets.filter(Boolean) : [];
  const requiredHeaders = Array.isArray(cfg.requiredHeaders) ? cfg.requiredHeaders.filter(Boolean) : [];
  const fallbackStartRow = Math.max(0, Number(cfg.startRow || 0));
  const names = [...preferredSheets, ...((workbook && workbook.sheetNames) || []).filter(name=>!preferredSheets.includes(name))];
  for(const sheetName of names){
    const rows = ((workbook && workbook.sheets && workbook.sheets[sheetName]) || []);
    const scanMax = Math.min(rows.length, Number(cfg.scanMaxRows || 12));
    for(let i=0; i<scanMax; i++){
      const row = Array.isArray(rows[i]) ? rows[i].map(v=>String(v ?? '').trim()).filter(Boolean) : [];
      if(!row.length) continue;
      const normalizedRow = row.map(normalizeExcelKey);
      const matched = requiredHeaders.every(header=>normalizedRow.includes(normalizeExcelKey(header)));
      if(matched) return {sheetName, startRow:i};
    }
  }
  const fallbackSheet = names[0] || (((workbook && workbook.sheetNames) || [])[0]) || '';
  return {sheetName:fallbackSheet, startRow:fallbackStartRow};
}

function parseNumericLike(value){
  const s = String(value ?? '').trim();
  if(!s) return '';
  return /^-?\d+(?:\.\d+)?$/.test(s) ? Number(s) : value;
}
function xmlNodeChildrenByLocalName(node, name){
  return Array.from(node ? node.childNodes || [] : []).filter(n=>n.nodeType===1 && n.localName===name);
}
function xmlFirstByLocalName(node, name){
  return Array.from(node ? node.getElementsByTagName('*') || [] : []).find(n=>n.localName===name) || null;
}
function xmlTextDeep(node){
  return Array.from(node ? node.childNodes || [] : []).map(n=>n.nodeType===3 ? (n.nodeValue || '') : xmlTextDeep(n)).join('');
}
function normalizeZipPath(path){
  const parts = [];
  String(path || '').replace(/\\/g,'/').split('/').forEach(part=>{
    if(!part || part === '.') return;
    if(part === '..') parts.pop();
    else parts.push(part);
  });
  return parts.join('/');
}
async function inflateZipEntry(bytes){
  if(typeof DecompressionStream !== 'undefined'){
    const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('deflate-raw'));
    return new Uint8Array(await new Response(stream).arrayBuffer());
  }
  throw new Error('This browser cannot inflate ZIP entries locally.');
}
async function unzipArrayBuffer(arrayBuffer){
  const bytes = arrayBuffer instanceof Uint8Array ? arrayBuffer : new Uint8Array(arrayBuffer);
  const view = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);
  let eocd = -1;
  for(let i=bytes.length - 22; i>=Math.max(0, bytes.length - 66000); i--){
    if(view.getUint32(i, true) === 0x06054b50){ eocd = i; break; }
  }
  if(eocd < 0) throw new Error('ZIP end record was not found.');
  const entryCount = view.getUint16(eocd + 10, true);
  const centralOffset = view.getUint32(eocd + 16, true);
  const decoder = new TextDecoder('utf-8');
  const files = {};
  let ptr = centralOffset;
  for(let index=0; index<entryCount; index++){
    if(view.getUint32(ptr, true) !== 0x02014b50) throw new Error('ZIP central directory is invalid.');
    const method = view.getUint16(ptr + 10, true);
    const compressedSize = view.getUint32(ptr + 20, true);
    const fileNameLength = view.getUint16(ptr + 28, true);
    const extraLength = view.getUint16(ptr + 30, true);
    const commentLength = view.getUint16(ptr + 32, true);
    const localHeaderOffset = view.getUint32(ptr + 42, true);
    const fileName = decoder.decode(bytes.slice(ptr + 46, ptr + 46 + fileNameLength));
    const localNameLength = view.getUint16(localHeaderOffset + 26, true);
    const localExtraLength = view.getUint16(localHeaderOffset + 28, true);
    const dataStart = localHeaderOffset + 30 + localNameLength + localExtraLength;
    const compressed = bytes.slice(dataStart, dataStart + compressedSize);
    let output;
    if(method === 0) output = compressed;
    else if(method === 8) output = await inflateZipEntry(compressed);
    else throw new Error('Unsupported ZIP compression method: ' + method);
    files[fileName] = output;
    ptr += 46 + fileNameLength + extraLength + commentLength;
  }
  return files;
}
function parseSheetRowsFromXml(xmlText, sharedStrings){
  const doc = new DOMParser().parseFromString(xmlText, 'application/xml');
  const rows = [];
  xmlNodeChildrenByLocalName(xmlFirstByLocalName(doc, 'sheetData'), 'row').forEach(rowNode=>{
    const rowIndex = Math.max(0, Number(rowNode.getAttribute('r') || '1') - 1);
    const row = rows[rowIndex] || [];
    xmlNodeChildrenByLocalName(rowNode, 'c').forEach(cellNode=>{
      const ref = cellNode.getAttribute('r') || '';
      const idx = excelRefToIndexes(ref);
      const type = cellNode.getAttribute('t') || '';
      let value = '';
      if(type === 'inlineStr'){
        value = Array.from(cellNode.getElementsByTagName('*')).filter(n=>n.localName==='t').map(xmlTextDeep).join('');
      } else {
        const raw = xmlTextDeep(xmlFirstByLocalName(cellNode, 'v'));
        if(type === 's') value = sharedStrings[Number(raw)] ?? '';
        else if(type === 'b') value = raw === '1';
        else value = parseNumericLike(raw);
      }
      if(idx.col >= 0) row[idx.col] = value;
    });
    rows[rowIndex] = row;
  });
  return rows;
}
function parseSharedStringsXml(xmlText){
  const doc = new DOMParser().parseFromString(xmlText, 'application/xml');
  return xmlNodeChildrenByLocalName(doc.documentElement, 'si').map(si=>Array.from(si.getElementsByTagName('*')).filter(n=>n.localName==='t').map(xmlTextDeep).join(''));
}
function resolveWorkbookTargetPath(target){
  const cleaned = String(target || '').replace(/\\/g,'/').trim();
  if(!cleaned) return '';
  const withoutLeadingSlash = cleaned.replace(/^\//,'');
  return normalizeZipPath(withoutLeadingSlash.startsWith('xl/') ? withoutLeadingSlash : 'xl/' + withoutLeadingSlash);
}
function resolveWorkbookSheetPaths(files){
  const decoder = new TextDecoder('utf-8');
  const workbookDoc = new DOMParser().parseFromString(decoder.decode(files['xl/workbook.xml']), 'application/xml');
  const relsDoc = new DOMParser().parseFromString(decoder.decode(files['xl/_rels/workbook.xml.rels']), 'application/xml');
  const relMap = {};
  Array.from(relsDoc.getElementsByTagName('*')).filter(n=>n.localName==='Relationship').forEach(rel=>{
    const id = rel.getAttribute('Id');
    const target = rel.getAttribute('Target') || '';
    relMap[id] = resolveWorkbookTargetPath(target);
  });
  return Array.from(workbookDoc.getElementsByTagName('*')).filter(n=>n.localName==='sheet').map(sheet=>{
    const rid = sheet.getAttribute('r:id') || sheet.getAttributeNS('http://schemas.openxmlformats.org/officeDocument/2006/relationships', 'id');
    return {name: sheet.getAttribute('name') || '', path: relMap[rid] || ''};
  });
}
function convertXlsxLibraryWorkbook(workbook){
  const out = {sheetNames:[...workbook.SheetNames], sheets:{}};
  workbook.SheetNames.forEach(name=>{

  });

async function parseWorkbookFromArrayBuffer(arrayBuffer){
  try{
    const files = await unzipArrayBuffer(arrayBuffer);
    const decoder = new TextDecoder('utf-8');
    const sharedStrings = files['xl/sharedStrings.xml'] ? parseSharedStringsXml(decoder.decode(files['xl/sharedStrings.xml'])) : [];
    const workbook = {sheetNames:[], sheets:{}};
    resolveWorkbookSheetPaths(files).forEach(sheet=>{
      workbook.sheetNames.push(sheet.name);
      workbook.sheets[sheet.name] = sheet.path && files[sheet.path] ? parseSheetRowsFromXml(decoder.decode(files[sheet.path]), sharedStrings) : [];
    });
    if(!workbook.sheetNames.length) throw new Error('No worksheets were found.');
    return workbook;
  } catch(localError){
    console.error(localError);
    const ok = await ensureXLSX();
    if(ok){
      try{
        return convertXlsxLibraryWorkbook(window.XLSX.read(arrayBuffer, {type:'array'}));
      }catch(fallbackError){
        console.error(fallbackError);
      }
    }
    throw localError;
  }
}

async function ensureScript(src, globalName){

function normalizeOCRIngredients(text){
  let s = String(text||'');
  state.ocrRules.forEach(r=>{ if(!r.wrong) return; s = s.split(r.wrong).join(r.correct||''); });
  s = s
    .replace(/全成分表示?/g,'')
    .replace(/配合成分/g,'')
    .replace(/[\u3000\t]/g, ' ')
    .replace(/[\n\r]+/g,'、')
    .replace(/[・･•·]/g,'、')
    .replace(/[;；:：]/g,'、')
    .replace(/\s{2,}/g,' ');
  return [...new Set(
    s.split(/[、,，]+/)
      .map(v=>v.trim())
      .map(v=>v.replace(/^\d+[.)．、]\s*/,''))
      .map(v=>v.replace(/^[・･•·\-－―]+/,''))
      .map(v=>v.replace(/^全成分[:：]?/,''))
      .map(v=>v.replace(/^成分[:：]?/,''))
      .map(v=>v.trim())
      .filter(Boolean)
      .filter(v=>!/^[※＊*?？!！。、,.\-_=+\/\\()\[\]{}<>~^|]+$/.test(v))
  )];
}

function normalizeExcelKey(value){
  return String(value ?? '').trim().toLowerCase().replace(/[\s\u3000_\-]+/g,'');
}
function getRowValue(row, candidates){
  if(!row || typeof row !== 'object') return '';
  for(const key of candidates){
    if(Object.prototype.hasOwnProperty.call(row, key)) return row[key];
  }
  const normalizedMap = {};
  Object.keys(row).forEach(key=>{ normalizedMap[normalizeExcelKey(key)] = row[key]; });
  for(const key of candidates){
    const normalized = normalizeExcelKey(key);
    if(Object.prototype.hasOwnProperty.call(normalizedMap, normalized)) return normalizedMap[normalized];
  }
  return '';
}
function splitExcelList(value){

function normalizeDomainValue(value){

  if(!raw) return '';
  if(['health','healthfood','healthfoods','supplement','supplements','健康食品','サプリ','サプリメント'].includes(raw)) return 'health';
  if(['cosmetics','cosmetic','beauty','化粧品','コスメ'].includes(raw)) return 'cosmetics';

function normalizeSubcategoryValue(value, domain){
  const raw = normalizeExcelKey(value);

    'toner':'toner','化粧水':'toner','ローション':'toner',
    'emulsion':'emulsion','乳液':'emulsion',
    'serum':'serum','美容液':'serum','エッセンス':'serum',
    'cream':'cream','クリーム':'cream',
    'mascara':'mascara','マスカラ':'mascara','まつげ美容液':'mascara'
  };
  const healthMap = {
    'capsule':'capsule','カプセル':'capsule',
    'tablet':'tablet','タブレット':'tablet','錠剤':'tablet',
    'powder':'powder','粉末':'powder','パウダー':'powder',

  const baseMap = domain === 'health' ? healthMap : cosmeticsMap;

      const scores={}; scoreKeys.forEach(k=>scores[k]=Number(getRowValue(r, [k]) || 0));
      const dimensions = domain==='health'
        ? {energy:Math.min(40, scores['活力']*4 + scores['抗疲労']*2 + scores['集中力'] + scores['筋肉']), rest:Math.min(40, scores['休息']*4 + scores['集中力']), beauty:Math.min(40, scores['美容']*3 + scores['保湿'] + scores['ハリ'] + scores['アンチエイジング']*2 + scores['抗酸化']), gut:Math.min(40, scores['腸活']*4), balance:Math.min(40, scores['健康']*2 + scores['免疫']*2 + scores['血行'] + scores['認知機能'] + scores['関節'] + scores['更年期サポート'] + scores['月経サポート'] + scores['妊活'] + scores['肝機能サポート'])}
        : {moisture:Math.min(40, scores['保湿']*4), barrier:Math.min(40, scores['バリア']*4 + scores['鎮静'] + scores['抗炎症']), brightening:Math.min(40, scores['透明感']*3 + scores['抗シミ']*2 + scores['抗酸化']), firmness:Math.min(40, scores['ハリ']*3 + scores['抗シワ']*2 + scores['アンチエイジング']), soothing:Math.min(40, scores['鎮静']*3 + scores['抗炎症']*2 + scores['抗ニキビ'])};
      const topTags = splitExcelList(String(getRowValue(r, ['高スコアタグ']) || '').replace(/[／]/g,'/'));
      const aliases = splitExcelList(String(getRowValue(r, ['別名']) || '').replace(/[／]/g,'/'));
      const note = String(getRowValue(r, ['注記','note']) || '').trim();
      const sourceUrls = String(getRowValue(r, ['Source URL(s)','sourceUrls']) || '').split(/\s*;\s*/).map(v=>v.trim()).filter(Boolean);
      let key = name;
      if(next[key]) key = `${name}__${kind}`;
      const detailJa = String(getRowValue(r, ['詳細','detail']) || '').trim();
      const detailEn = String(getRowValue(r, ['英語版詳細','detailEn']) || '').trim();
      const detailZh = String(getRowValue(r, ['中国語版詳細','detailZh']) || '').trim();
      next[key] = {
        key,
        nameJa:name,
        inci:String(getRowValue(r, ['INCI','inci']) || '').trim(),
        nameEn:String(getRowValue(r, ['英語名','nameEn']) || '').trim(),
        nameZh:String(getRowValue(r, ['中国語名','nameZh']) || '').trim(),
        aliases,
        classification,
        kind,
        domain,
        role:String(getRowValue(r, ['役割','role']) || '').trim(),
        topTags,
        tags:[...new Set([...topTags, classification].filter(Boolean))],
        short: detailJa.includes('。') ? detailJa.split('。')[0].trim() + '。' : detailJa,
        shortEn: detailEn.includes('.') ? detailEn.split('.')[0].trim() + '.' : detailEn,
        shortZh: detailZh.includes('。') ? detailZh.split('。')[0].trim() + '。' : detailZh,
        detail:detailJa,
        detailEn:detailEn,
        detailZh:detailZh,
        merits:topTags.slice(0,3),
        cautions:[...(note?[note]:[]), ...(Number(scores['肌刺激性']||0)>=6 ? ['肌刺激性スコアが比較的高いため注意'] : Number(scores['肌刺激性']||0)>=3 ? ['肌刺激性は中程度'] : [])],
        dimensions,
        scores,
        sourceUrls,
        note,
        mongolia:/モンゴル|蒙古/.test([name, detailJa, detailZh, note, aliases.join(' ')].join(' ')),
        createdAt:Number(getRowValue(r, ['createdAt']) || Date.now()-i*1000),
        views:Number(getRowValue(r, ['views']) || 0)
      };
    } else {
      const name = String(getRowValue(r, ['name','成分名（日本語）']) || '').trim(); if(!name) return;
      const domain = normalizeDomainValue(getRowValue(r, ['domain','ジャンル'])) || 'cosmetics';
      next[name] = {
        key:name,
        nameJa:name,
        inci:String(getRowValue(r, ['inci','INCI']) || '').trim(),
        nameEn:String(getRowValue(r, ['nameEn','英語名']) || '').trim(),
        nameZh:String(getRowValue(r, ['nameZh','中国語名']) || '').trim(),
        aliases:splitExcelList(getRowValue(r, ['aliases','別名'])),
        classification:String(getRowValue(r, ['classification','区分']) || '').trim(),
        kind:String(getRowValue(r, ['kind']) || (domain==='health' ? 'health' : 'cosmetic')),
        domain,
        role:String(getRowValue(r, ['role','役割']) || ''),
        topTags:splitExcelList(getRowValue(r, ['topTags','高スコアタグ','tags'])),
        tags:splitExcelList(getRowValue(r, ['tags','高スコアタグ'])),
        short:String(getRowValue(r, ['short']) || ''),
        shortEn:String(getRowValue(r, ['shortEn']) || ''),
        shortZh:String(getRowValue(r, ['shortZh']) || ''),
        detail:String(getRowValue(r, ['detail','詳細']) || ''),
        detailEn:String(getRowValue(r, ['detailEn','英語版詳細']) || ''),
        detailZh:String(getRowValue(r, ['detailZh','中国語版詳細']) || ''),
        merits:splitExcelList(getRowValue(r, ['merits'])),
        cautions:splitExcelList(getRowValue(r, ['cautions'])),
        dimensions:{moisture:Number(getRowValue(r, ['moisture']) || 0), barrier:Number(getRowValue(r, ['barrier']) || 0), brightening:Number(getRowValue(r, ['brightening']) || 0), firmness:Number(getRowValue(r, ['firmness']) || 0), soothing:Number(getRowValue(r, ['soothing']) || 0), energy:Number(getRowValue(r, ['energy']) || 0), rest:Number(getRowValue(r, ['rest']) || 0), beauty:Number(getRowValue(r, ['beauty']) || 0), gut:Number(getRowValue(r, ['gut']) || 0), balance:Number(getRowValue(r, ['balance']) || 0)},
        scores:{}, sourceUrls:String(getRowValue(r, ['sourceUrls','Source URL(s)']) || '').split(/\s*;\s*/).map(v=>v.trim()).filter(Boolean), note:String(getRowValue(r, ['note','注記']) || ''),
        mongolia:booleanLike(getRowValue(r, ['mongolia'])),
        createdAt:Number(getRowValue(r, ['createdAt']) || Date.now()-i*1000), views:Number(getRowValue(r, ['views']) || 0)
      };
    }
  });
  state.ingredients = next;
  persistAll();
  populateTagFilters();
  renderIngredientPage();
  renderMongoliaPage();
  renderRankingPage();
  renderRecommendedIngredients();
  document.getElementById('excelImportStatus').textContent = importStatusText('ingredients', Object.keys(state.ingredients).length);
  return Object.keys(state.ingredients).length;
}
async function importIngredientsWorkbookFromArrayBuffer(arrayBuffer){
  const workbook = await parseWorkbookFromArrayBuffer(arrayBuffer);
  const cfgRich = findWorkbookSheetConfig(workbook, {preferredSheets:['Ingredients'], requiredHeaders:['成分名（日本語）','区分','詳細'], scanMaxRows:12, startRow:3});
  let rows = workbookSheetToObjects(workbook, cfgRich.sheetName, cfgRich.startRow);
  if(!rows.length){
    const cfgSimple = findWorkbookSheetConfig(workbook, {preferredSheets:['Ingredients'], requiredHeaders:['name','domain'], scanMaxRows:12, startRow:0});
    rows = workbookSheetToObjects(workbook, cfgSimple.sheetName, cfgSimple.startRow);
  }
  return applyImportedIngredientRows(rows);
}
async function importIngredientsExcel(){
  const file = document.getElementById('ingredientExcelInput').files[0];
  if(!file){ alert(t('chooseFile')); return; }
  try{
    const importedCount = await importIngredientsWorkbookFromArrayBuffer(await file.arrayBuffer());
    if(!importedCount) throw new Error('No ingredient rows were imported.');
  }catch(error){
    console.error(error);
    alert(excelReadErrorMessage());
  }
}
function importOcrCorrectionsExcel(){
  readExcelFile('ocrExcelInput', rows=>{
    state.ocrRules = rows.map(r=>({
      wrong:String(getRowValue(r, ['wrong','誤','誤変換']) || '').trim(),
      correct:String(getRowValue(r, ['correct','修正後','正']) || '').trim()
    })).filter(v=>v.wrong);
    persistAll();
    document.getElementById('excelImportStatus').textContent = importStatusText('ocr', state.ocrRules.length);
  }, {preferredSheets:['ocr'], requiredHeaders:['wrong','correct'], scanMaxRows:6});
}
function exportRowsAsWorkbook(rows, sheetName, filename){
  ensureXLSX().then(ok=>{ if(!ok){ alert('XLSX library failed to load'); return; } const ws = window.XLSX.utils.json_to_sheet(rows); const wb = window.XLSX.utils.book_new(); window.XLSX.utils.book_append_sheet(wb, ws, sheetName); window.XLSX.writeFile(wb, filename); });
}
